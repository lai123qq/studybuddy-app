<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f8f9fc">
<title>ScienceHub · 学科知识库</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body { overscroll-behavior: none; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
    background: #f8f9fc; color: #1e293b;
    min-height: 100vh; overflow-x: hidden;
    padding: 16px env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .app { max-width: 480px; margin: 0 auto; padding: 16px 16px 100px; }

  /* Header */
  .head { margin-bottom: 20px; margin-top: 20px; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 4px;
    color: #64748b; text-decoration: none; font-size: 14px; font-weight: 500;
    padding: 10px 14px; border-radius: 10px; min-height: 44px;
    background: transparent; cursor: pointer; font-family: inherit;
    margin-bottom: 8px; transition: background 0.2s; border: none;
  }
  .back-btn:hover { background: rgba(100,116,139,0.08); }
  .back-btn:active { opacity: 0.6; }
  .back-btn svg { width: 20px; height: 20px; }
  .head h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .head .subtitle { font-size: 13px; color: #94a3b8; }

  /* Tabs */
  .tabs {
    display: flex; gap: 8px; margin-bottom: 20px;
    overflow-x: auto; scrollbar-width: none; padding-bottom: 4px;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 8px 18px; border-radius: 20px;
    border: none; background: #e2e8f0; color: #64748b;
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .tab.active {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    color: #fff; box-shadow: 0 2px 8px rgba(59,130,246,0.3);
  }

  /* Section */
  .section { display: none; }
  .section.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Search */
  .search-box {
    width: 100%; padding: 12px 16px; border-radius: 12px;
    border: 1px solid #e2e8f0; background: #fff;
    font-size: 14px; margin-bottom: 16px; outline: none;
    font-family: inherit;
  }
  .search-box:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }

  /* Chemistry - Periodic Table */
  .periodic-table {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px; margin-bottom: 16px;
  }
  .element {
    aspect-ratio: 1; border-radius: 8px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 11px; cursor: pointer;
    transition: all 0.2s; border: 1px solid transparent;
    position: relative; overflow: hidden;
  }
  .element .sym { font-size: 16px; font-weight: 700; }
  .element .num { font-size: 9px; opacity: 0.7; position: absolute; top: 2px; left: 4px; }
  .element .name { font-size: 8px; opacity: 0.8; }
  .element:active { transform: scale(0.95); }

  .el-nonmetal { background: #dbeafe; color: #1e40af; }
  .el-noble { background: #e0e7ff; color: #3730a3; }
  .el-alkali { background: #fee2e2; color: #991b1b; }
  .el-alkaline { background: #ffedd5; color: #9a3412; }
  .el-transition { background: #fef3c7; color: #92400e; }
  .el-halogen { background: #d1fae5; color: #065f46; }
  .el-metalloid { background: #f3e8ff; color: #6b21a8; }

  .element-detail {
    background: #fff; border-radius: 16px; padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 16px;
  }
  .element-detail h3 {
    font-size: 20px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .element-detail .badge {
    display: inline-block; padding: 2px 10px; border-radius: 8px;
    font-size: 12px; font-weight: 500;
  }
  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .detail-item {
    background: #f8fafc; padding: 10px; border-radius: 10px;
  }
  .detail-item .label { font-size: 11px; color: #94a3b8; }
  .detail-item .value { font-size: 14px; font-weight: 600; color: #1e293b; }

  /* Version Selector */
  .version-selector {
    background: #fff; border-radius: 14px;
    padding: 14px 16px; margin-bottom: 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  }
  .version-label {
    font-size: 13px; font-weight: 600; color: #475569;
    margin-bottom: 8px;
  }
  .version-pills {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .v-pill {
    padding: 6px 12px; border-radius: 16px;
    border: 1px solid #e2e8f0; background: #f8fafc;
    color: #64748b; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  .v-pill:active { transform: scale(0.96); }
  .v-pill.active {
    background: linear-gradient(135deg, #06b6d4, #22d3ee);
    color: #fff; border-color: transparent;
    box-shadow: 0 2px 6px rgba(6,182,212,0.3);
  }
  .formula-card .ver-tag {
    display: inline-block; padding: 1px 8px; border-radius: 6px;
    font-size: 10px; font-weight: 600; margin-left: 8px;
    vertical-align: middle;
  }
  .ver-tag.pep { background: #dbeafe; color: #1e40af; }
  .ver-tag.huke { background: #fce7f3; color: #be185d; }
  .ver-tag.suke { background: #d1fae5; color: #065f46; }
  .ver-tag.bsdsd { background: #fef3c7; color: #92400e; }
  .ver-tag.yueke { background: #e0e7ff; color: #3730a3; }
  .ver-tag.jiaoke { background: #f3e8ff; color: #6b21a8; }

  /* Physics - Formula Cards */
  .formula-card {
    background: #fff; border-radius: 14px; padding: 16px;
    margin-bottom: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    border-left: 4px solid #3b82f6;
  }
  .formula-card h4 { font-size: 15px; margin-bottom: 8px; color: #1e293b; }
  .formula-card .formula {
    font-family: 'Times New Roman', serif; font-size: 18px;
    color: #3b82f6; background: #eff6ff; padding: 8px 12px;
    border-radius: 8px; display: inline-block; margin-bottom: 8px;
  }
  .formula-card .explain { font-size: 13px; color: #64748b; line-height: 1.6; }
  .formula-card .vars { font-size: 12px; color: #94a3b8; margin-top: 6px; }

  /* History - Timeline */
  .timeline { position: relative; padding-left: 24px; }
  .timeline::before {
    content: ''; position: absolute; left: 6px; top: 0; bottom: 0;
    width: 2px; background: linear-gradient(180deg, #3b82f6, #8b5cf6);
  }
  .timeline-item {
    position: relative; margin-bottom: 16px;
    background: #fff; border-radius: 12px; padding: 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  }
  .timeline-item::before {
    content: ''; position: absolute; left: -20px; top: 18px;
    width: 10px; height: 10px; border-radius: 50%;
    background: #3b82f6; border: 2px solid #fff;
    box-shadow: 0 0 0 2px #3b82f6;
  }
  .timeline-item .year {
    font-size: 12px; font-weight: 700; color: #3b82f6;
    margin-bottom: 4px;
  }
  .timeline-item h4 { font-size: 15px; margin-bottom: 4px; }
  .timeline-item p { font-size: 13px; color: #64748b; line-height: 1.5; }
  .dynasty-tag {
    display: inline-block; padding: 2px 8px; border-radius: 6px;
    font-size: 11px; font-weight: 500; margin-top: 6px;
  }

  /* Quiz */
  .quiz-card {
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    border-radius: 16px; padding: 20px; margin-bottom: 16px;
  }
  .quiz-card h3 { font-size: 16px; margin-bottom: 12px; }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; }
  .quiz-option {
    background: #fff; border: 2px solid transparent;
    border-radius: 10px; padding: 12px; font-size: 14px;
    cursor: pointer; transition: all 0.2s; text-align: left;
    font-family: inherit;
  }
  .quiz-option:hover { border-color: #f59e0b; }
  .quiz-option.correct { background: #d1fae5; border-color: #10b981; }
  .quiz-option.wrong { background: #fee2e2; border-color: #ef4444; }

  /* Quick facts */
  .fact-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 16px;
  }
  .fact-card {
    background: #fff; border-radius: 12px; padding: 14px;
    text-align: center; box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  }
  .fact-card .icon { font-size: 28px; margin-bottom: 6px; }
  .fact-card h4 { font-size: 13px; margin-bottom: 2px; }
  .fact-card p { font-size: 11px; color: #94a3b8; }

  .hidden { display: none !important; }

  @media (max-width: 480px) {
    body { font-size: 14px; }
    .app { padding: 16px 10px 100px; }
    .head h1 { font-size: 17px; }
    .head .subtitle { font-size: 12px; }
    .tab { padding: 6px 12px; font-size: 13px; }
    .search-box { padding: 10px 12px; font-size: 14px; }
    .periodic-table { grid-template-columns: repeat(8, 1fr); gap: 3px; }
    .element .sym { font-size: 13px; }
    .element .num { font-size: 7px; }
    .element .name { font-size: 7px; }
    .element-detail { padding: 14px; border-radius: 12px; }
    .element-detail h3 { font-size: 17px; }
    .detail-grid { gap: 6px; }
    .detail-item { padding: 8px; }
    .detail-item .value { font-size: 12px; }
    .v-pill { padding: 5px 10px; font-size: 11px; }
    .formula-card .ver-tag { font-size: 9px; padding: 1px 6px; }
    .formula-card { padding: 12px; margin-bottom: 8px; }
    .formula-card h4 { font-size: 13px; }
    .formula-card .formula { font-size: 15px; padding: 6px 10px; }
    .formula-card .explain { font-size: 12px; }
    .timeline-item { padding: 10px; margin-bottom: 10px; }
    .timeline-item h4 { font-size: 13px; }
    .timeline-item p { font-size: 12px; }
    .timeline-item .year { font-size: 11px; }
    .quiz-card { padding: 14px; }
    .quiz-card h3 { font-size: 14px; }
    .quiz-option { padding: 10px; font-size: 13px; }
    .fact-grid { gap: 6px; }
    .fact-card { padding: 10px; }
    .fact-card .icon { font-size: 17px; }
    .fact-card h4 { font-size: 12px; }
  }

  @media (min-width: 520px) {
    .app { padding: 16px 24px 100px; }
    .periodic-table { grid-template-columns: repeat(10, 1fr); }
  }

  /* ====== 主题：深色模式 ====== */
  body.theme-dark { background: #0f0f23 !important; color: #e2e8f0 !important; }
  body.theme-dark *, body.theme-dark *::before, body.theme-dark *::after { border-color: rgba(124,107,255,0.15); }
  body.theme-dark .head, body.theme-dark .header, body.theme-dark .app-header, body.theme-dark h1, body.theme-dark h2, body.theme-dark h3 { color: #f8fafc !important; }
  body.theme-dark input, body.theme-dark select, body.theme-dark textarea { background: #1e293b !important; color: #e2e8f0 !important; }
  body.theme-dark button, body.theme-dark .btn { background: #1e293b !important; color: #e2e8f0 !important; border-color: rgba(124,107,255,0.3) !important; }
  /* ====== 主题：中国风 ====== */
  body.theme-chinese { background: #f5f0e8 !important; color: #3d3d3d !important; }
  body.theme-chinese *, body.theme-chinese *::before, body.theme-chinese *::after { border-color: #e8ddd0; }
  body.theme-chinese .head, body.theme-chinese .header, body.theme-chinese .app-header, body.theme-chinese h1, body.theme-chinese h2, body.theme-chinese h3 { color: #2c1810 !important; }
  body.theme-chinese input, body.theme-chinese select, body.theme-chinese textarea { background: #faf6f0 !important; color: #3d3d3d !important; }
  body.theme-chinese button, body.theme-chinese .btn { background: #e8ddd0 !important; color: #2c1810 !important; border-color: #d4c8b8 !important; }
  /* ====== 主题：彩色 ====== */
  body.theme-colorful { background: linear-gradient(180deg, #fef3c7 0%, #fce7f3 50%, #e0e7ff 100%) !important; }
</style>

    <div id="physicsContent"></div>

    <div class="quiz-card">

  <!-- HISTORY -->

    </div>
  </div>
</div>

document.querySelectorAll('.top-tabs .tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.top-tabs .tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById(tab.dataset.tab).classList.add('active');
  });
});

function renderTable(filter) {
  var container = document.getElementById('periodicTable');
  container.innerHTML = '';
  elements.forEach(function(el) {
    if (filter && !el.name.includes(filter) && !el.sym.toLowerCase().includes(filter.toLowerCase())) return;
    var c = catColors[el.cat];
    var div = document.createElement('div');
    div.className = 'element el-' + el.cat;
    div.innerHTML = '<span class="num">' + el.n + '</span><span class="sym">' + el.sym + '</span><span class="name">' + el.name + '</span>';
    div.addEventListener('click', function() { showElement(el); });
    container.appendChild(div);
  });
}

function showElement(el) {
  var c = catColors[el.cat];
  document.getElementById('elementDetail').innerHTML =
    '<h3>' + el.name + ' <span style="font-size:14px;color:#94a3b8">' + el.sym + '</span></h3>' +
    '<span class="badge" style="background:' + c.bg + ';color:' + c.color + '">' + c.name + '</span>' +
    '<div class="detail-grid" style="margin-top:12px">' +
    '<div class="detail-item"><div class="label">原子序数</div><div class="value">' + el.n + '</div></div>' +
    '<div class="detail-item"><div class="label">相对原子质量</div><div class="value">' + el.mass + '</div></div>' +
    '<div class="detail-item"><div class="label">电子排布</div><div class="value">' + el.config + '</div></div>' +
    '<div class="detail-item"><div class="label">常见化合价</div><div class="value">' + el.valence + '</div></div>' +
    '</div>';
}

function renderPhysics(grade, ver, filter) {
  var container = document.getElementById('physicsContent');
  container.innerHTML = '';
  var filtered = physicsFormulas.filter(function(f) {
    var gradeOk = (grade === 'all' || f.grade === grade);
    var verOk = (ver === 'all' || (f.ver && f.ver.indexOf(ver) !== -1));
    var filterOk = (!filter || f.name.includes(filter) || f.formula.toLowerCase().includes(filter.toLowerCase()));
    return gradeOk && verOk && filterOk;
  });
  if (filtered.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:20px">暂无匹配的公式</p>';
    return;
  }
  if (ver !== 'all') {
    var gradeOrder = ['junior-8','junior-9','senior-10','senior-11','senior-12'];
    var chapterOrderMap = {};
    if (versionChapterOrder[ver]) {
      Object.keys(versionChapterOrder[ver]).forEach(function(g) {
        chapterOrderMap[g] = {};
        versionChapterOrder[ver][g].forEach(function(ch, idx) {
          chapterOrderMap[g][ch] = idx;
        });
      });
    }
    filtered.sort(function(a, b) {
      var ga = gradeOrder.indexOf(a.grade);
      var gb = gradeOrder.indexOf(b.grade);
      if (ga !== gb) return ga - gb;
      var ca = chapterOrderMap[a.grade] && chapterOrderMap[a.grade][a.chapter] !== undefined ? chapterOrderMap[a.grade][a.chapter] : 999;
      var cb = chapterOrderMap[b.grade] && chapterOrderMap[b.grade][b.chapter] !== undefined ? chapterOrderMap[b.grade][b.chapter] : 999;
      return ca - cb;
    });
    var currentChapter = '';
    filtered.forEach(function(f) {
      if (f.chapter !== currentChapter) {
        currentChapter = f.chapter;
        var tag = document.createElement('div');
        tag.style.cssText = 'font-size:13px; font-weight:700; color:#fff; background:linear-gradient(135deg, #3b82f6, #8b5cf6); padding:6px 12px; border-radius:8px; display:inline-block; margin:16px 0 8px;';
        tag.textContent = f.chapter;
        container.appendChild(tag);
      }
      var card = document.createElement('div');
      card.className = 'formula-card';
      card.style.borderLeftColor = gradeColors[f.grade];
      var verHtml = '';
      if (ver !== 'all' && f.ver && f.ver.indexOf(ver) !== -1) {
        verHtml = '<span class="ver-tag ' + ver + '">' + verNames[ver] + '</span>';
      }
      card.innerHTML = '<h4>' + f.name + verHtml + '</h4><div class="formula">' + f.formula + '</div><div class="explain">' + f.explain + '</div><div class="vars">' + f.vars + '</div>';
      container.appendChild(card);
    });
  } else {
    var currentGrade = '';
    filtered.forEach(function(f) {
      if (f.grade !== currentGrade) {
        currentGrade = f.grade;
        var tag = document.createElement('div');
        tag.style.cssText = 'font-size:13px;font-weight:700;color:' + gradeColors[f.grade] + ';margin:16px 0 8px;padding-left:4px;';
        tag.textContent = '📚 ' + gradeNames[f.grade] + '物理';
        container.appendChild(tag);
      }
      var card = document.createElement('div');
      card.className = 'formula-card';
      card.style.borderLeftColor = gradeColors[f.grade];
      var verHtml = '';
      if (ver !== 'all' && f.ver && f.ver.indexOf(ver) !== -1) {
        verHtml = '<span class="ver-tag ' + ver + '">' + verNames[ver] + '</span>';
      }
      card.innerHTML = '<h4>' + f.name + verHtml + '</h4><div class="formula">' + f.formula + '</div><div class="explain">' + f.explain + '</div><div class="vars">' + f.vars + '</div>';
      container.appendChild(card);
    });
  }
}

  {year:'公元8年',title:'王莽改制',desc:'外戚王莽篡汉建立新朝，推行改革但失败，引发绿林赤眉起义。',era:'junior-ancient',tag:'新',tagColor:'#e0e7ff',tagText:'#3730a3'},
  {year:'25年',title:'东汉建立',desc:'刘秀重建汉朝，定都洛阳，史称东汉。光武帝恢复社会秩序，出现"光武中兴"。',era:'junior-ancient',tag:'汉',tagColor:'#ffedd5',tagText:'#9a3412'},
  {year:'105年',title:'蔡伦改进造纸术',desc:'东汉蔡伦改进造纸术，用树皮、麻头等制纸，大大降低了造纸成本，推动了文化传播。',era:'junior-ancient',tag:'汉',tagColor:'#ffedd5',tagText:'#9a3412'},
  {year:'200年',title:'官渡之战',desc:'曹操以少胜多击败袁绍，奠定了统一北方的基础，是三国时期的重要转折点。',era:'junior-ancient',tag:'三国',tagColor:'#fce7f3',tagText:'#be185d'},
  {year:'208年',title:'赤壁之战',desc:'孙刘联军以少胜多击败曹操，奠定三国鼎立局面。',era:'junior-ancient',tag:'三国',tagColor:'#fce7f3',tagText:'#be185d'},
  {year:'220年',title:'三国鼎立',desc:'曹丕代汉建魏，刘备建蜀汉，孙权建吴，三国鼎立局面正式形成。',era:'junior-ancient',tag:'三国',tagColor:'#fce7f3',tagText:'#be185d'},

  // --- 初三（世界史·新航路开辟-工业革命+中国古代续）---
  {year:'280年',title:'西晋统一',desc:'司马炎建立西晋，短暂统一全国。但八王之乱后国力衰退，北方陷入五胡十六国的混乱。',era:'junior-9',tag:'晋',tagColor:'#e0e7ff',tagText:'#3730a3'},
  {year:'317年',title:'东晋建立',desc:'西晋灭亡后，司马睿在建康（今南京）建立东晋，南方经济开始快速发展。',era:'junior-9',tag:'晋',tagColor:'#e0e7ff',tagText:'#3730a3'},
  {year:'420年',title:'南北朝时期',desc:'东晋灭亡后，南方经历宋、齐、梁、陈四朝，北方经历北魏等朝代，民族融合加速。',era:'junior-9',tag:'南北朝',tagColor:'#fef3c7',tagText:'#92400e'},
  {year:'589年',title:'隋朝统一全国',desc:'隋文帝杨坚统一南北朝，结束近300年的分裂局面。开凿大运河，创立科举制。',era:'junior-9',tag:'隋',tagColor:'#e0e7ff',tagText:'#3730a3'},
  {year:'907年',title:'唐朝灭亡 · 五代十国',desc:'黄巢起义后唐朝名存实亡，朱温篡唐建立后梁。此后进入五代十国的分裂时期。',era:'junior-9',tag:'五代',tagColor:'#fecaca',tagText:'#991b1b'},
  {year:'960年',title:'北宋统一',desc:'赵匡胤陈桥兵变建立北宋，结束五代十国分裂局面。推行重文轻武政策，经济文化高度繁荣。',era:'junior-9',tag:'宋',tagColor:'#f3e8ff',tagText:'#6b21a8'},
  {year:'1127年',title:'南宋建立',desc:'靖康之变后，赵构在临安（今杭州）建立南宋。南宋与金对峙，经济重心完成南移。',era:'junior-9',tag:'宋',tagColor:'#f3e8ff',tagText:'#6b21a8'},
  {year:'1206年',title:'蒙古帝国建立',desc:'成吉思汗统一蒙古各部，建立蒙古帝国。此后蒙古军队西征，建立了横跨欧亚的庞大帝国。',era:'junior-9',tag:'元',tagColor:'#e0f2fe',tagText:'#0c4a6e'},
  {year:'1271年',title:'元朝建立',desc:'忽必烈改国号为元，定都大都（今北京），统一全国。实行行省制度，促进民族交融。',era:'junior-9',tag:'元',tagColor:'#e0f2fe',tagText:'#0c4a6e'},
  {year:'1368年',title:'明朝建立',desc:'朱元璋推翻元朝建立明朝，废除丞相制度，设立锦衣卫和东厂等特务机构加强皇权。',era:'junior-9',tag:'明',tagColor:'#d1fae5',tagText:'#065f46'},
  {year:'1405年',title:'郑和下西洋',desc:'明成祖派郑和七次下西洋，最远到达非洲东海岸，是世界航海史上的伟大壮举。',era:'junior-9',tag:'明',tagColor:'#d1fae5',tagText:'#065f46'},
  {year:'1644年',title:'清军入关',desc:'李自成攻入北京，崇祯帝自缢。清军在吴三桂引下入关，逐步统一全国。',era:'junior-9',tag:'清前期',tagColor:'#e0e7ff',tagText:'#3730a3'},
  {year:'1689年',title:'《尼布楚条约》签订',desc:'中俄签订《尼布楚条约》，从法律上明确了中俄东段边界，是中国第一个平等的国际条约。',era:'junior-9',tag:'清前期',tagColor:'#e0e7ff',tagText:'#3730a3'},
  {year:'1776年',title:'美国独立',desc:'北美十三州殖民地发表《独立宣言》，脱离英国独立。华盛顿成为美国第一任总统。',era:'junior-9',tag:'世界',tagColor:'#f0f9ff',tagText:'#0c4a6e'},
  {year:'1789年',title:'法国大革命',desc:'巴黎人民攻占巴士底狱，法国大革命爆发，发表《人权宣言》，推翻了波旁王朝的封建统治。',era:'junior-9',tag:'世界',tagColor:'#f0f9ff',tagText:'#0c4a6e'},
  {year:'1818年',title:'马克思主义诞生',desc:'马克思、恩格斯发表《共产党宣言》，标志着马克思主义的诞生，无产阶级登上历史舞台。',era:'junior-9',tag:'世界',tagColor:'#f0f9ff',tagText:'#0c4a6e'},

  // --- 初二近代（中国近代史·1840-1949）---
  {year:'1840年',title:'鸦片战争爆发',desc:'英国以禁烟运动为借口发动侵华战争，清政府战败，被迫签订《南京条约》，中国开始沦为半殖民地半封建社会。',era:'junior-modern',tag:'晚清',tagColor:'#fecaca',tagText:'#991b1b'},
  {year:'1851年',title:'太平天国运动',desc:'洪秀全领导金田起义，建立太平天国，颁布《天朝田亩制度》，是规模最大的农民起义。',era:'junior-modern',tag:'晚清',tagColor:'#fecaca',tagText:'#991b1b'},
  {year:'1856年',title:'第二次鸦片战争',desc:'英法联军发动侵华战争，火烧圆明园，签订《天津条约》《北京条约》，中国半殖民地化程度加深。',era:'junior-modern',tag:'晚清',tagColor:'#fecaca',tagText:'#991b1b'},
  {year:'1894年',title:'甲午中日战争',desc:'日本发动侵华战争，北洋水师全军覆没，签订《马关条约》，割台湾及赔款。',era:'junior-modern',tag:'晚清',tagColor:'#fecaca',tagText:'#991b1b'},
  {year:'1898年',title:'戊戌变法',desc:'康有为、梁启超等推动维新变法，持续103天后失败，谭嗣同等"戊戌六君子"遇难。',era:'junior-modern',tag:'晚清',tagColor:'#fecaca',tagText:'#991b1b'},
  {year:'1900年',title:'八国联军侵华',desc:'八国联军攻占北京，签订《辛丑条约》，中国完全沦为半殖民地半封建社会。',era:'junior-modern',tag:'晚清',tagColor:'#fecaca',tagText:'#991b1b'},
  {year:'1911年',title:'辛亥革命',desc:'孙中山领导的革命推翻清朝统治，1912年中华民国成立，结束了两千多年的封建帝制。',era:'junior-modern',tag:'民国',tagColor:'#bfdbfe',tagText:'#1e40af'},
  {year:'1915年',title:'新文化运动',desc:'陈独秀、胡适等人发起新文化运动，提倡民主与科学，反对封建思想文化。',era:'junior-modern',tag:'民国',tagColor:'#bfdbfe',tagText:'#1e40af'},
  {year:'1919年',title:'五四运动',desc:'巴黎和会上中国外交失败引发五四运动，工人阶级登上政治舞台，标志着新民主主义革命的开端。',era:'junior-modern',tag:'民国',tagColor:'#bfdbfe',tagText:'#1e40af'},
  {year:'1921年',title:'中国共产党成立',desc:'中共一大在上海召开，标志着中国共产党正式成立，中国革命面貌焕然一新。',era:'junior-modern',tag:'建党',tagColor:'#dcfce7',tagText:'#166534'},
  {year:'1926年',title:'北伐战争',desc:'国共合作北伐，基本推翻了北洋军阀的统治，但1927年蒋介石发动政变，国共合作破裂。',era:'junior-modern',tag:'民国',tagColor:'#bfdbfe',tagText:'#1e40af'},
  {year:'1934年',title:'红军长征',desc:'第五次反围剿失败后，红军开始长征，历经艰难险阻，1936年三大主力会师，保存了革命力量。',era:'junior-modern',tag:'革命',tagColor:'#dcfce7',tagText:'#166534'},
  {year:'1937年',title:'全面抗战爆发',desc:'七七事变后抗日战争全面爆发，国共第二次合作。经历了淞沪会战、台儿庄战役、百团大战等。',era:'junior-modern',tag:'抗战',tagColor:'#fef3c7',tagText:'#92400e'},
  {year:'1945年',title:'抗日战争胜利',desc:'经过八年全面抗战，中国取得胜利，洗刷了近代以来的民族耻辱。台湾回归中国。',era:'junior-modern',tag:'抗战',tagColor:'#fef3c7',tagText:'#92400e'},
  {year:'1949年',title:'中华人民共和国成立',desc:'1949年10月1日，毛泽东在天安门城楼宣告中华人民共和国成立，中国人民从此站起来了。',era:'junior-modern',tag:'建国',tagColor:'#dcfce7',tagText:'#166534'},

  // --- 高一古代（中国古代史深化·隋唐-清前期）---
  {year:'581年',title:'隋朝建立',desc:'杨坚建立隋朝，统一南北。隋炀帝开通大运河，加强了南北经济文化交流。',era:'senior-ancient',tag:'隋',tagColor:'#e0e7ff',tagText:'#3730a3'},
  {year:'618年',title:'唐朝建立',desc:'李渊建立唐朝，随后出现"贞观之治"、"开元盛世"，是中国古代最繁荣的朝代之一。',era:'senior-ancient',tag:'唐',tagColor:'#fce7f3',tagText:'#be185d'},
  {year:'627年',title:'贞观之治',desc:'唐太宗李世民在位期间，虚心纳谏，轻徭薄赋，政治清明，经济繁荣，民族关系和谐。',era:'senior-ancient',tag:'唐',tagColor:'#fce7f3',tagText:'#be185d'},
  {year:'755年',title:'安史之乱',desc:'安禄山、史思明发动叛乱，唐朝由盛转衰。持续八年的战争严重削弱了唐朝国力。',era:'senior-ancient',tag:'唐',tagColor:'#fce7f3',tagText:'#be185d'},
  {year:'960年',title:'北宋建立',desc:'赵匡胤陈桥兵变建立宋朝，推行重文轻武政策，经济和文化高度繁荣。',era:'senior-ancient',tag:'宋',tagColor:'#f3e8ff',tagText:'#6b21a8'},
  {year:'1041年',title:'毕昇发明活字印刷术',desc:'北宋毕昇发明胶泥活字印刷术，比欧洲古腾堡早约400年，极大推动了文化传播。',era:'senior-ancient',tag:'宋',tagColor:'#f3e8ff',tagText:'#6b21a8'},
  {year:'1115年',title:'金朝建立',desc:'女真族完颜阿骨打建立金朝，1127年金灭北宋，史称"靖康之变"。',era:'senior-ancient',tag:'宋',tagColor:'#f3e8ff',tagText:'#6b21a8'},
  {year:'1271年',title:'元朝建立',desc:'忽必烈建立元朝，统一全国。行省制度对后世影响深远，马可波罗来华。',era:'senior-ancient',tag:'元',tagColor:'#e0f2fe',tagText:'#0c4a6e'},
  {year:'1368年',title:'明朝建立',desc:'朱元璋推翻元朝建立明朝，废除丞相制度，设锦衣卫加强皇权。',era:'senior-ancient',tag:'明',tagColor:'#d1fae5',tagText:'#065f46'},
  {year:'1405年',title:'郑和下西洋',desc:'明成祖派郑和七次下西洋，最远到达东非，比哥伦布航行早半个世纪，是世界航海史壮举。',era:'senior-ancient',tag:'明',tagColor:'#d1fae5',tagText:'#065f46'},
  {year:'1644年',title:'清军入关',desc:'李自成攻入北京，崇祯帝自缢。清军在吴三桂引下入关，建立清朝。',era:'senior-ancient',tag:'明/清',tagColor:'#e0e7ff',tagText:'#3730a3'},
  {year:'1689年',title:'《尼布楚条约》',desc:'中俄签订《尼布楚条约》，是中国历史上第一个平等的国际边界条约。',era:'senior-ancient',tag:'清',tagColor:'#e0e7ff',tagText:'#3730a3'},

  // --- 高二近代（中国近代深化·工业革命-二战）---
  {year:'1760年代',title:'工业革命',desc:'英国率先开始工业革命，蒸汽机的广泛应用彻底改变了生产方式，人类社会从农业文明进入工业文明。',era:'senior-modern',tag:'世界',tagColor:'#f0f9ff',tagText:'#0c4a6e'},
  {year:'1789年',title:'法国大革命',desc:'巴黎人民攻占巴士底狱，法国大革命爆发。发表《人权宣言》，推翻了波旁王朝。',era:'senior-modern',tag:'世界',tagColor:'#f0f9ff',tagText:'#0c4a6e'},
  {year:'1848年',title:'《共产党宣言》发表',desc:'马克思、恩格斯发表《共产党宣言》，标志着马克思主义的诞生。',era:'senior-modern',tag:'世界',tagColor:'#f0f9ff',tagText:'#0c4a6e'},
  {year:'1861年',title:'美国南北战争',desc:'林肯当选总统后南北战争爆发，最终北方获胜，废除了奴隶制度。',era:'senior-modern',tag:'世界',tagColor:'#f0f9ff',tagText:'#0c4a6e'},
  {year:'1868年',title:'日本明治维新',desc:'日本推翻幕府统治，推行全面西化改革，迅速走上资本主义道路。',era:'senior-modern',tag:'世界',tagColor:'#f0f9ff',tagText:'#0c4a6e'},
  {year:'1914年',title:'第一次世界大战',desc:'萨拉热窝事件引发第一次世界大战，历时四年多，造成巨大伤亡，深刻改变了世界格局。',era:'senior-modern',tag:'世界',tagColor:'#f0f9ff',tagText:'#0c4a6e'},
  {year:'1917年',title:'俄国十月革命',desc:'列宁领导布尔什维克发动十月革命，建立世界上第一个社会主义国家，鼓舞了全球被压迫民族。',era:'senior-modern',tag:'世界',tagColor:'#f0f9ff',tagText:'#0c4a6e'},
  {year:'1929年',title:'经济大危机',desc:'美国纽约股市崩盘引发全球经济大萧条，各国失业率飙升，加速了法西斯势力的崛起。',era:'senior-modern',tag:'世界',tagColor:'#f0f9ff',tagText:'#0c4a6e'},
  {year:'1939年',title:'第二次世界大战全面爆发',desc:'德国闪击波兰，二战全面爆发。中国抗日战争成为世界反法西斯战争的重要组成部分。',era:'senior-modern',tag:'世界',tagColor:'#fef2f2',tagText:'#991b1b'},
  {year:'1945年',title:'二战结束 · 联合国成立',desc:'日本投降，第二次世界大战结束。联合国成立，雅尔塔体系确立，世界进入冷战格局。',era:'senior-modern',tag:'世界',tagColor:'#dcfce7',tagText:'#166534'},

  // --- 高三世界（世界历史深化·古代文明-当代）---
  {year:'约前3500年',title:'古埃及文明',desc:'尼罗河流域出现古埃及文明，建造金字塔和狮身人面像，发明象形文字。',era:'senior-world',tag:'古文明',tagColor:'#fef3c7',tagText:'#92400e'},
  {year:'约前3000年',title:'两河流域文明',desc:'苏美尔人建立城邦，发明楔形文字和《汉谟拉比法典》，是已知最早的成文法典。',era:'senior-world',tag:'古文明',tagColor:'#fef3c7',tagText:'#92400e'},
  {year:'约前2500年',title:'古印度文明',desc:'印度河流域出现哈拉帕文明，后来雅利安人入侵建立种姓制度。佛教在此诞生。',era:'senior-world',tag:'古文明',tagColor:'#fef3c7',tagText:'#92400e'},
  {year:'约前800年',title:'古希腊城邦兴起',desc:'雅典和斯巴达等城邦兴起，雅典发展出民主政治，苏格拉底、柏拉图、亚里士多德等哲学家影响深远。',era:'senior-world',tag:'古希腊',tagColor:'#dbeafe',tagText:'#1e40af'},
  {year:'前509年',title:'罗马共和国建立',desc:'罗马从王政时代进入共和国时期，通过战争不断扩张，成为地中海霸主。',era:'senior-world',tag:'古罗马',tagColor:'#fce7f3',tagText:'#be185d'},
  {year:'前27年',title:'罗马帝国建立',desc:'屋大维建立罗马帝国，进入"罗马和平"时期。基督教在此期间兴起并传播。',era:'senior-world',tag:'古罗马',tagColor:'#fce7f3',tagText:'#be185d'},
  {year:'476年',title:'西罗马帝国灭亡',desc:'日耳曼人入侵导致西罗马灭亡，欧洲进入中世纪，封建制度和基督教会主导欧洲。',era:'senior-world',tag:'中世纪',tagColor:'#f3e8ff',tagText:'#6b21a8'},
  {year:'1453年',title:'拜占庭帝国灭亡',desc:'奥斯曼帝国攻占君士坦丁堡，东罗马帝国灭亡，标志着中世纪的结束。',era:'senior-world',tag:'中世纪',tagColor:'#f3e8ff',tagText:'#6b21a8'},
  {year:'1492年',title:'哥伦布发现新大陆',desc:'哥伦布横渡大西洋到达美洲，开启了大航海时代和欧洲殖民扩张。',era:'senior-world',tag:'大航海',tagColor:'#e0f2fe',tagText:'#0c4a6e'},
  {year:'1687年',title:'牛顿发表《自然哲学的数学原理》',desc:'牛顿总结三大定律和万有引力定律，标志着近代科学的形成。',era:'senior-world',tag:'启蒙',tagColor:'#f0fdf4',tagText:'#166534'},
  {year:'1789年',title:'美国宪法生效',desc:'美国联邦政府正式运作，三权分立原则确立，成为世界上第一部成文宪法。',era:'senior-world',tag:'革命',tagColor:'#fef2f2',tagText:'#991b1b'},

];

function renderHistory(era, filter) {
  var container = document.getElementById('historyContent');
  container.innerHTML = '';
  var filtered = historyEvents.filter(function(ev) {
    var eraOk = (era === 'all' || era === ev.era || (era === 'ancient' && (ev.era === 'junior-ancient' || ev.era === 'senior-ancient')));
    var filterOk = (!filter || ev.title.includes(filter) || ev.desc.includes(filter) || ev.year.includes(filter));
    return eraOk && filterOk;
  });
  if (filtered.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:20px">暂无匹配的历史事件</p>';
    return;
  }
  var timeline = document.createElement('div');
  timeline.className = 'timeline';
  filtered.forEach(function(ev) {
    var item = document.createElement('div');
    item.className = 'timeline-item';
    item.innerHTML = '<div class="year">' + ev.year + '</div><h4>' + ev.title + '</h4><p>' + ev.desc + '</p><span class="dynasty-tag" style="background:' + ev.tagColor + ';color:' + ev.tagText + '">' + ev.tag + '</span>';
    timeline.appendChild(item);
  });
  container.appendChild(timeline);
}

var currentHistEra = 'all';
document.querySelectorAll('#histTabs .tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('#histTabs .tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    currentHistEra = tab.dataset.era;
    var filter = document.getElementById('histSearch').value;
    renderHistory(currentHistEra, filter);
  });
});

renderHistory('all', '');

document.getElementById('histSearch').addEventListener('input', function(e) {
  renderHistory(currentHistEra, e.target.value);
});

  {q:'戊戌变法中壮烈牺牲的是谁？',opts:['康有为','梁启超','谭嗣同','严复'],ans:2},
  {q:'中国共产党成立于哪一年？',opts:['1919年','1920年','1921年','1922年'],ans:2},
];

function shuffleArray(arr) {
  return SBUtils.shuffle(arr);
}

function setupQuiz(qArr, qId, optId) {
  var questions = shuffleArray(qArr);
  var idx = 0;
  function show() {
    var q = questions[idx];
    document.getElementById(qId).textContent = q.q;
    var container = document.getElementById(optId);
    container.innerHTML = '';
    var correctText = q.opts[q.ans];
    var shuffledOpts = shuffleArray(q.opts);
    shuffledOpts.forEach(function(opt) {
      var btn = document.createElement('button');
      btn.className = 'quiz-option';
      btn.textContent = opt;
      btn.addEventListener('click', function() {
        if (opt === correctText) {
          btn.classList.add('correct');
          setTimeout(function() {
            idx = (idx + 1) % questions.length;
            show();
          }, 800);
        } else {
          btn.classList.add('wrong');
        }
      });
      container.appendChild(btn);
    });
  }
  show();
}

setupQuiz(chemQuestions, 'chemQ', 'chemOpts');
setupQuiz(physQuestions, 'physQ', 'physOpts');
setupQuiz(histQuestions, 'histQ', 'histOpts');
