<html lang="zh-CN">
<head>

<title>VocabBuilder · 词汇构建者</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body { overscroll-behavior: none; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
    background: #f8f9fc; color: #1e293b;
    min-height: 100vh; overflow-x: hidden;
    padding: 28px env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .app { max-width: 480px; margin: 0 auto; padding: 20px 16px 100px; }

  /* Header */
  .head { margin-bottom: 16px; margin-top: 24px; }
  .back-btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 4px; color: #64748b; text-decoration: none; font-size: 14px;
    margin-bottom: 10px; cursor: pointer; min-width: 44px; min-height: 44px;
    padding: 10px 14px; border-radius: 10px; transition: background 0.2s;
    border: none; background: transparent; font-family: inherit; margin-top: 0px; }
  .back-btn:active { background: #e2e8f0; }
  .head h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .head .subtitle { font-size: 13px; color: #94a3b8; }

  /* Library selector */
  .lib-bar {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    background: #fff; border-radius: 12px; padding: 10px 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  }
  .lib-bar label { font-size: 13px; color: #64748b; font-weight: 500; }
  .lib-bar select {
    flex: 1; border: none; background: transparent; font-size: 14px; font-weight: 600;
    color: #1e293b; font-family: inherit; outline: none; cursor: pointer;
  }
  .lib-info { font-size: 12px; color: #94a3b8; }

  /* Daily goal */
  .goal-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: #fff; border-radius: 12px; padding: 12px 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04); margin-bottom: 16px;
  }
  .goal-bar .lbl { font-size: 13px; color: #64748b; font-weight: 500; }
  .goal-bar .val { font-size: 14px; font-weight: 700; color: #1e293b; }
  .goal-bar .val b { color: #6366f1; }
  .goal-bar input[type="number"] {
    width: 56px; border: 1px solid #e2e8f0; border-radius: 8px; padding: 4px 6px;
    font-size: 14px; font-weight: 600; text-align: center; font-family: inherit;
  }

  /* Progress */
  .progress-bar {
    background: #fff; border-radius: 12px; padding: 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04); margin-bottom: 16px;
  }
  .progress-title { font-size: 13px; font-weight: 600; color: #1e293b; margin-bottom: 10px; }
  .progress-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .progress-cell { text-align: center; }
  .progress-cell .num { font-size: 20px; font-weight: 700; color: #6366f1; }
  .progress-cell .txt { font-size: 11px; color: #94a3b8; margin-top: 2px; }

  /* Mode tabs */
  .mode-tabs {
    display: flex; gap: 8px; margin-bottom: 20px;
    overflow-x: auto; scrollbar-width: none; padding-bottom: 4px;
  }
  .mode-tabs::-webkit-scrollbar { display: none; }
  .mode-tab {
    flex-shrink: 0; padding: 8px 18px; border-radius: 20px;
    border: none; background: #e2e8f0; color: #64748b;
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .mode-tab.active {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff; box-shadow: 0 2px 8px rgba(99,102,241,0.3);
  }

  /* Card */
  .card-area { perspective: 1200px; margin-bottom: 20px; }
  .word-card {
    position: relative; width: 100%; height: 280px;
    transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
    transform-style: preserve-3d; cursor: pointer;
  }
  .word-card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0; backface-visibility: hidden;
    background: #fff; border-radius: 20px; padding: 28px 24px;
    box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    border: 1px solid rgba(226,232,240,0.6);
  }
  .card-face.back { transform: rotateY(180deg); background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border-color: transparent; }
  .card-face .word { font-size: 32px; font-weight: 700; color: #1e293b; margin-bottom: 6px; letter-spacing: -0.02em; }
  .card-face.back .word { color: #fff; }
  .card-face .phonetic { font-size: 15px; color: #94a3b8; font-family: 'JetBrainsMono', monospace; margin-bottom: 16px; }
  .card-face.back .phonetic { color: rgba(255,255,255,0.7); }
  .card-face .meaning { font-size: 18px; color: #475569; font-weight: 500; text-align: center; line-height: 1.5; }
  .card-face.back .meaning { color: rgba(255,255,255,0.95); }
  .card-face .hint { position: absolute; bottom: 16px; font-size: 12px; color: #cbd5e1; }
  .card-face.back .hint { color: rgba(255,255,255,0.5); }

  /* Controls */
  .ctrl-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .ctrl-btn {
    flex: 1; padding: 14px; border-radius: 14px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .ctrl-btn.primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
  .ctrl-btn.primary:active { transform: scale(0.97); }
  .ctrl-btn.ghost { background: #fff; color: #64748b; border: 1px solid #e2e8f0; }
  .ctrl-btn.ghost:active { background: #f1f5f9; }

  /* Quiz options */
  .quiz-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .quiz-opt {
    background: #fff; border: 2px solid #e2e8f0; border-radius: 14px; padding: 14px 16px;
    font-size: 15px; color: #1e293b; cursor: pointer; transition: all 0.2s; font-family: inherit;
    text-align: left;
  }
  .quiz-opt:hover { border-color: #cbd5e1; }
  .quiz-opt.correct { border-color: #22c55e; background: #f0fdf4; color: #166534; }
  .quiz-opt.wrong { border-color: #ef4444; background: #fef2f2; color: #b91c1c; }
  .quiz-opt.disabled { opacity: 0.6; pointer-events: none; }

  /* Spell input */
  .spell-box {
    background: #fff; border-radius: 14px; padding: 20px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04); margin-bottom: 16px;
  }
  .spell-prompt { font-size: 16px; color: #475569; margin-bottom: 12px; text-align: center; }
  .spell-prompt b { color: #1e293b; }
  .spell-input {
    width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px;
    font-size: 18px; font-family: inherit; text-align: center; outline: none; transition: border-color 0.2s;
  }
  .spell-input:focus { border-color: #6366f1; }
  .spell-input.correct { border-color: #22c55e; background: #f0fdf4; }
  .spell-input.wrong { border-color: #ef4444; background: #fef2f2; }
  .spell-result { text-align: center; margin-top: 10px; font-size: 14px; font-weight: 600; }
  .spell-result.ok { color: #22c55e; }
  .spell-result.bad { color: #ef4444; }

  /* Score bar */
  .score-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: #fff; border-radius: 12px; padding: 12px 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04); margin-bottom: 16px;
  }
  .score-bar .item { text-align: center; }
  .score-bar .item .num { font-size: 18px; font-weight: 700; color: #6366f1; }
  .score-bar .item .txt { font-size: 11px; color: #94a3b8; }

  /* Streak badge */
  .streak-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: linear-gradient(135deg, #f59e0b, #fbbf24); color: #fff;
    padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700;
  }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
  .shake { animation: shake 0.4s ease; }
  @keyframes pop { 0%{transform:scale(0.9)} 50%{transform:scale(1.02)} 100%{transform:scale(1)} }
  .pop { animation: pop 0.3s ease; }

  /* Section display */
  .section { display: none; }
  .section.active { display: block; }

  /* Responsive */
  @media (max-width: 480px) {
    body { font-size: 14px; }
    .app { padding: 10px 12px 100px; max-width: 100%; }
    .head h1 { font-size: 17px; }
    .head .subtitle { font-size: 12px; }
    .word-card { height: 240px; }
    .card-face .word { font-size: 19px; }
    .card-face .pos { font-size: 12px; }
    .card-face .phonetic { font-size: 13px; }
    .card-face .meaning { font-size: 13px; }
    .progress-bar { padding: 12px; }
    .progress-cell .num { font-size: 15px; }
    .progress-cell .txt { font-size: 10px; }
    .goal-bar { padding: 10px 12px; }
    .goal-bar .lbl { font-size: 12px; }
    .goal-bar .val { font-size: 13px; }
    .lib-bar { padding: 8px 12px; }
    .lib-bar label { font-size: 12px; }
    .lib-bar select { font-size: 13px; }
    .lib-info { font-size: 11px; }
    .mode-tabs { gap: 6px; margin-bottom: 16px; }
    .mode-tab { padding: 6px 14px; font-size: 13px; }
    .quiz-option { padding: 10px; font-size: 13px; min-height: 44px; }
    .vocab-toolbar { white-space: normal; word-break: break-word; }
    .toast { bottom: calc(24px + env(safe-area-inset-bottom)); }
  }
  @media (max-width: 360px) {
    .word-card { height: 220px; }
    .card-face .word { font-size: 22px; }
  }

  /* ====== 主题：深色模式 ====== */
  body.theme-dark { background: #0f0f23 !important; color: #e2e8f0 !important; }
  body.theme-dark *, body.theme-dark *::before, body.theme-dark *::after { border-color: rgba(124,107,255,0.15); }
  body.theme-dark .head, body.theme-dark .header, body.theme-dark .app-header, body.theme-dark h1, body.theme-dark h2, body.theme-dark h3 { color: #f8fafc !important; }
  body.theme-dark input, body.theme-dark select, body.theme-dark textarea { background: #1e293b !important; color: #e2e8f0 !important; }
  body.theme-dark button, body.theme-dark .btn { background: #1e293b !important; color: #e2e8f0 !important; border-color: rgba(124,107,255,0.3) !important; }
  /* ====== 主题：中国风 ====== */
  body.theme-chinese { background: #f5f0e8 !important; color: #3d3d3d !important; }
  body.theme-chinese *, body.theme-chinese *::before, body.theme-chinese *::after { border-color: #e8ddd0; }
  body.theme-chinese .head, body.theme-chinese .header, body.theme-chinese .app-header, body.theme-chinese h1, body.theme-chinese h2, body.theme-chinese h3 { color: #2c1810 !important; }
  body.theme-chinese input, body.theme-chinese select, body.theme-chinese textarea { background: #faf6f0 !important; color: #3d3d3d !important; }
  body.theme-chinese button, body.theme-chinese .btn { background: #e8ddd0 !important; color: #2c1810 !important; border-color: #d4c8b8 !important; }

  body.theme-colorful { background: linear-gradient(180deg, #fef3c7 0%, #fce7f3 50%, #e0e7ff 100%) !important; }
</style>

<div class="app">

  <div class="lib-bar">

      <option value="high">高考核心 (300词)</option>
      <option value="cet4">四级核心 (200词)</option>
      <option value="cet6">六级核心 (200词)</option>
    </select>
    <span class="lib-info" id="libCount">300词</span>
  </div>

  <div class="goal-bar">
    <span class="lbl">每日目标</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <input type="number" id="dailyGoal" value="20" min="5" max="100" onchange="saveGoal()">
      <span class="val">词 / 天</span>
    </div>
    <span class="val">今日: <b id="todayCount">0</b></span>
  </div>

  <div class="progress-bar">
    <div class="progress-title">学习进度</div>
    <div class="progress-grid">
      <div class="progress-cell">
        <div class="num" id="progLearned">0</div>
        <div class="txt">已学习</div>
      </div>
      <div class="progress-cell">
        <div class="num" id="progAccuracy">0%</div>
        <div class="txt">正确率</div>
      </div>
      <div class="progress-cell">
        <div class="num" id="progStreak">0</div>
        <div class="txt">连续天数</div>
      </div>
    </div>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('browse')">浏览模式</button>
    <button class="mode-tab" onclick="setMode('quiz')">测验模式</button>
    <button class="mode-tab" onclick="setMode('spell')">拼写模式</button>
  </div>

  <div id="browseSection" class="section active">
    <div class="card-area" onclick="flipCard()">
      <div class="word-card" id="browseCard">
        <div class="card-face front">
          <div class="word" id="bWord">word</div>
          <div class="phonetic" id="bPhonetic">/phonetic/</div>
          <div class="hint">点击翻转查看释义</div>
        </div>
        <div class="card-face back">
          <div class="word" id="bWordBack">word</div>
          <div class="meaning" id="bMeaning">meaning</div>
          <div class="hint">点击翻转</div>
        </div>
      </div>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn ghost" onclick="prevWord()">上一个</button>
      <button class="ctrl-btn primary" onclick="nextWord()">下一个</button>
    </div>
  </div>

  <div id="quizSection" class="section">
    <div class="score-bar">
      <div class="item"><div class="num" id="qScore">0</div><div class="txt">得分</div></div>
      <div class="item"><div class="num" id="qTotal">0</div><div class="txt">题目</div></div>
      <div class="item"><div class="num" id="qStreak">0</div><div class="txt">连对</div></div>
    </div>
    <div class="card-area">
      <div class="word-card" style="height:140px;cursor:default;">
        <div class="card-face front" style="justify-content:center;">
          <div class="word" id="qWord">word</div>
          <div class="phonetic" id="qPhonetic">/phonetic/</div>
        </div>
      </div>
    </div>
    <div class="quiz-options" id="qOptions"></div>
    <div class="ctrl-row">
      <button class="ctrl-btn primary" onclick="nextQuiz()">下一题</button>
    </div>
  </div>

  <div id="spellSection" class="section">
    <div class="score-bar">
      <div class="item"><div class="num" id="sScore">0</div><div class="txt">得分</div></div>
      <div class="item"><div class="num" id="sTotal">0</div><div class="txt">题目</div></div>
      <div class="item"><div class="num" id="sStreak">0</div><div class="txt">连对</div></div>
    </div>
    <div class="spell-box">
      <div class="spell-prompt">请根据释义拼写单词：<br><b id="sMeaning">meaning</b></div>
      <input type="text" class="spell-input" id="sInput" placeholder="输入英文单词" autocomplete="off" autocorrect="off" autocapitalize="off" onkeydown="if(event.key==='Enter')checkSpell()">
      <div class="spell-result" id="sResult"></div>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn ghost" onclick="showSpellHint()">提示</button>
      <button class="ctrl-btn primary" onclick="checkSpell()">检查</button>
      <button class="ctrl-btn primary" onclick="nextSpell()" id="sNextBtn" style="display:none;">下一题</button>
    </div>
  </div>
</div>

// ============================================================
// App Logic
// ============================================================
let currentLib = 'middle';
let currentIndex = 0;
let currentMode = 'browse';
let quizScore = 0, quizTotal = 0, quizStreak = 0;
let spellScore = 0, spellTotal = 0, spellStreak = 0;
let spellChecked = false;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function loadStorage() {
  const g = localStorage.getItem('vb_goal');
  if (g) document.getElementById('dailyGoal').value = g;
  const lib = localStorage.getItem('vb_lib');
  if (lib && VOCAB[lib]) { currentLib = lib; document.getElementById('libSelect').value = lib; }
  const idx = localStorage.getItem('vb_currentIndex_' + currentLib);
  if (idx) currentIndex = parseInt(idx, 10);
  updateProgress();
  updateTodayCount();
}

function saveStorage() {
  localStorage.setItem('vb_lib', currentLib);
  localStorage.setItem('vb_currentIndex_' + currentLib, currentIndex);
}

function saveGoal() {
  const v = parseInt(document.getElementById('dailyGoal').value, 10) || 20;
  localStorage.setItem('vb_goal', v);
}

function getTodayKey() {
  const d = new Date();
  return 'vb_' + d.getFullYear() + '_' + (d.getMonth()+1) + '_' + d.getDate();
}

function getTodayCount() {
  const k = getTodayKey();
  return parseInt(localStorage.getItem(k) || '0', 10);
}

function addTodayCount(n) {
  const k = getTodayKey();
  localStorage.setItem(k, (getTodayCount() + n).toString());
  updateTodayCount();
}

function updateTodayCount() {
  document.getElementById('todayCount').textContent = getTodayCount();
}

function getLearnedKey(lib) { return 'vb_learned_' + lib; }
function getCorrectKey(lib) { return 'vb_correct_' + lib; }
function getTotalKey(lib) { return 'vb_total_' + lib; }
function getStreakKey() { return 'vb_streak'; }
function getLastDateKey() { return 'vb_lastdate'; }

function recordLearned(lib) {
  try {
    const k = getLearnedKey(lib);
    const raw = localStorage.getItem(k);
    let arr = [];
    if (raw) { try { arr = JSON.parse(raw); if (!Array.isArray(arr)) arr = []; } catch(e) { arr = []; } }
    const set = new Set(arr);
    const words = VOCAB[lib];
    if (!words || !words[currentIndex]) return;
    set.add(words[currentIndex][0]);
    localStorage.setItem(k, JSON.stringify(Array.from(set)));
  } catch (e) { console.error('recordLearned error', e); }
}

function recordAnswer(lib, isCorrect) {
  const ck = getCorrectKey(lib), tk = getTotalKey(lib);
  localStorage.setItem(tk, (parseInt(localStorage.getItem(tk)||'0',10)+1).toString());
  if (isCorrect) localStorage.setItem(ck, (parseInt(localStorage.getItem(ck)||'0',10)+1).toString());
  // streak
  const today = new Date().toDateString();
  const last = localStorage.getItem(getLastDateKey());
  if (last !== today) {
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    if (last === yesterday.toDateString()) {
      localStorage.setItem(getStreakKey(), (parseInt(localStorage.getItem(getStreakKey())||'0',10)+1).toString());
    } else { localStorage.setItem(getStreakKey(), '1'); }
    localStorage.setItem(getLastDateKey(), today);
  }
}

function updateProgress() {
  const lib = currentLib;
  const learned = JSON.parse(localStorage.getItem(getLearnedKey(lib)) || '[]').length;
  const correct = parseInt(localStorage.getItem(getCorrectKey(lib)) || '0', 10);
  const total = parseInt(localStorage.getItem(getTotalKey(lib)) || '0', 10);
  const acc = total > 0 ? Math.round(correct / total * 100) : 0;
  const streak = parseInt(localStorage.getItem(getStreakKey()) || '0', 10);
  document.getElementById('progLearned').textContent = learned;
  document.getElementById('progAccuracy').textContent = acc + '%';
  document.getElementById('progStreak').textContent = streak;
}

function changeLib() {
  currentLib = document.getElementById('libSelect').value;
  currentIndex = parseInt(localStorage.getItem('vb_currentIndex_' + currentLib) || '0', 10);
  document.getElementById('libCount').textContent = VOCAB[currentLib].length + '词';
  saveStorage();
  updateProgress();
  if (currentMode === 'browse') renderBrowse();
  if (currentMode === 'quiz') nextQuiz(true);
  if (currentMode === 'spell') nextSpell(true);
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(mode + 'Section').classList.add('active');
  if (mode === 'browse') renderBrowse();
  if (mode === 'quiz') nextQuiz(true);
  if (mode === 'spell') nextSpell(true);
}

// Browse
function renderBrowse() {
  const words = VOCAB[currentLib];
  const w = words[currentIndex];
  if (!w) return;
  document.getElementById('bWord').textContent = w[0];
  document.getElementById('bWordBack').textContent = w[0];
  document.getElementById('bPhonetic').textContent = w[2];
  document.getElementById('bMeaning').textContent = w[1];
  document.getElementById('browseCard').classList.remove('flipped');
  recordLearned(currentLib);
  updateProgress();
}

function flipCard() {
  document.getElementById('browseCard').classList.toggle('flipped');
}

function nextWord() {
  const words = VOCAB[currentLib];
  currentIndex = (currentIndex + 1) % words.length;
  saveStorage();
  renderBrowse();
  addTodayCount(1);
}

function prevWord() {
  const words = VOCAB[currentLib];
  currentIndex = (currentIndex - 1 + words.length) % words.length;
  saveStorage();
  renderBrowse();
}

// Quiz
let quizCurrent = null;
let quizOptions = [];

function nextQuiz(reset) {
  if (reset) { quizScore = 0; quizTotal = 0; quizStreak = 0; }
  const words = VOCAB[currentLib];
  if (words.length < 4) return;
  quizCurrent = words[Math.floor(Math.random() * words.length)];
  const others = words.filter(w => w[0] !== quizCurrent[0]);
  const wrong = shuffle(others).slice(0, 3);
  quizOptions = shuffle([quizCurrent, ...wrong]);
  document.getElementById('qWord').textContent = quizCurrent[0];
  document.getElementById('qPhonetic').textContent = quizCurrent[2];
  const opts = document.getElementById('qOptions');
  opts.innerHTML = '';
  quizOptions.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt[1];
    btn.onclick = () => pickQuiz(i);
    opts.appendChild(btn);
  });
  document.getElementById('qScore').textContent = quizScore;
  document.getElementById('qTotal').textContent = quizTotal;
  document.getElementById('qStreak').textContent = quizStreak;
}

function pickQuiz(idx) {
  const btns = document.querySelectorAll('.quiz-opt');
  const correctIdx = quizOptions.findIndex(o => o[0] === quizCurrent[0]);
  btns.forEach((b, i) => {
    b.classList.add('disabled');
    if (i === correctIdx) b.classList.add('correct');
    else if (i === idx) b.classList.add('wrong');
  });
  const ok = (idx === correctIdx);
  if (ok) { quizScore++; quizStreak++; } else { quizStreak = 0; }
  quizTotal++;
  recordAnswer(currentLib, ok);
  addTodayCount(1);
  document.getElementById('qScore').textContent = quizScore;
  document.getElementById('qTotal').textContent = quizTotal;
  document.getElementById('qStreak').textContent = quizStreak;
  updateProgress();
}

// Spell
let spellCurrent = null;
let spellHintUsed = false;

function nextSpell(reset) {
  if (reset) { spellScore = 0; spellTotal = 0; spellStreak = 0; }
  const words = VOCAB[currentLib];
  spellCurrent = words[Math.floor(Math.random() * words.length)];
  spellHintUsed = false;
  spellChecked = false;
  document.getElementById('sMeaning').textContent = spellCurrent[1];
  const inp = document.getElementById('sInput');
  inp.value = ''; inp.className = 'spell-input'; inp.disabled = false; inp.focus();
  document.getElementById('sResult').textContent = '';
  document.getElementById('sResult').className = 'spell-result';
  document.getElementById('sNextBtn').style.display = 'none';
  document.getElementById('sScore').textContent = spellScore;
  document.getElementById('sTotal').textContent = spellTotal;
  document.getElementById('sStreak').textContent = spellStreak;
}

function showSpellHint() {
  if (!spellCurrent || spellChecked) return;
  const inp = document.getElementById('sInput');
  const w = spellCurrent[0];
  if (inp.value.length < w.length) {
    inp.value = w.slice(0, inp.value.length + 1);
    spellHintUsed = true;
  }
}

function checkSpell() {
  if (!spellCurrent || spellChecked) return;
  const inp = document.getElementById('sInput');
  const val = inp.value.trim().toLowerCase();
  const correct = spellCurrent[0].toLowerCase();
  const ok = (val === correct);
  spellChecked = true;
  inp.disabled = true;
  const res = document.getElementById('sResult');
  if (ok) {
    inp.classList.add('correct');
    res.textContent = '正确！' + (spellHintUsed ? '（使用了提示）' : '');
    res.className = 'spell-result ok';
    spellScore++; spellStreak++;
  } else {
    inp.classList.add('wrong');
    res.innerHTML = '错误。正确答案是 <b>' + spellCurrent[0] + '</b>';
    res.className = 'spell-result bad';
    spellStreak = 0;
  }
  spellTotal++;
  recordAnswer(currentLib, ok);
  addTodayCount(1);
  document.getElementById('sScore').textContent = spellScore;
  document.getElementById('sTotal').textContent = spellTotal;
  document.getElementById('sStreak').textContent = spellStreak;
  document.getElementById('sNextBtn').style.display = 'flex';
  updateProgress();
}

// Init
function init() {
  document.getElementById('libCount').textContent = VOCAB[currentLib].length + '词';
  loadStorage();
  renderBrowse();
}
init();
</script>
