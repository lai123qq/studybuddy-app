<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<meta http-equiv="Expires" content="0">

<title>GeoHub · 地理知识库 v2</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body { overscroll-behavior: none; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
    background: #f8f9fc; color: #1e293b;
    min-height: 100vh; overflow-x: hidden;
    padding: 16px env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .app { max-width: 480px; margin: 0 auto; padding: 0 16px 100px; }

  /* Header */
  .head { margin-bottom: 20px; margin-top: 16px; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 4px;
    color: #64748b; text-decoration: none; font-size: 14px; font-weight: 500;
    padding: 10px 14px; border-radius: 10px; min-height: 44px;
    background: transparent; cursor: pointer; font-family: inherit;
    margin-bottom: 8px; transition: background 0.2s; border: none;
  }
  .back-btn:hover { background: rgba(100,116,139,0.08); }
  .back-btn:active { opacity: 0.6; }
  .back-btn svg { width: 20px; height: 20px; }
  .head h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .head .subtitle { font-size: 13px; color: #94a3b8; }

  /* Tabs */
  .tabs {
    display: flex; gap: 8px; margin-bottom: 20px;
    overflow-x: auto; scrollbar-width: none; padding-bottom: 4px;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 8px 18px; border-radius: 20px;
    border: none; background: #e2e8f0; color: #64748b;
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .tab.active {
    background: linear-gradient(135deg, #10b981, #06b6d4);
    color: #fff; box-shadow: 0 2px 8px rgba(16,185,129,0.3);
  }

  /* Sub-tabs (category pills) */
  .sub-tabs {
    display: flex; gap: 6px; margin-bottom: 16px;
    overflow-x: auto; scrollbar-width: none; padding-bottom: 4px;
  }
  .sub-tabs::-webkit-scrollbar { display: none; }
  .sub-tab {
    flex-shrink: 0; padding: 6px 14px; border-radius: 16px;
    border: 1px solid #e2e8f0; background: #fff;
    color: #475569; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  .sub-tab:active { transform: scale(0.96); }
  .sub-tab.active {
    background: linear-gradient(135deg, #10b981, #06b6d4);
    color: #fff; border-color: transparent;
    box-shadow: 0 2px 6px rgba(16,185,129,0.25);
  }

  /* Section */
  .section { display: none; }
  .section.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Search */
  .search-box {
    width: 100%; padding: 12px 16px; border-radius: 12px;
    border: 1px solid #e2e8f0; background: #fff;
    font-size: 14px; margin-bottom: 16px; outline: none;
    font-family: inherit;
  }
  .search-box:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }

  /* Knowledge Cards */
  .geo-card {
    background: #fff; border-radius: 14px; padding: 16px;
    margin-bottom: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    border-left: 4px solid #10b981;
  }
  .geo-card h4 {
    font-size: 15px; margin-bottom: 8px; color: #1e293b;
    cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  }
  .geo-card h4 .toggle-icon {
    font-size: 12px; color: #94a3b8; transition: transform 0.3s;
  }
  .geo-card h4 .toggle-icon.open { transform: rotate(180deg); }
  .geo-card .card-body {
    display: none; font-size: 13px; color: #64748b;
    line-height: 1.7; padding-top: 8px;
  }
  .geo-card .card-body.open { display: block; }
  .geo-card .card-body ul {
    padding-left: 18px; margin-top: 6px;
  }
  .geo-card .card-body li { margin-bottom: 4px; }
  .geo-card .card-body strong { color: #1e293b; }
  .geo-card .card-body .tag {
    display: inline-block; padding: 1px 8px; border-radius: 6px;
    font-size: 11px; font-weight: 500; margin-right: 4px; margin-bottom: 4px;
  }
  .tag-green { background: #d1fae5; color: #065f46; }
  .tag-blue { background: #dbeafe; color: #1e40af; }
  .tag-orange { background: #ffedd5; color: #9a3412; }
  .tag-purple { background: #f3e8ff; color: #6b21a8; }
  .tag-red { background: #fee2e2; color: #991b1b; }
  .tag-cyan { background: #cffafe; color: #155e75; }

  /* Table inside cards */
  .geo-table {
    width: 100%; border-collapse: collapse; margin-top: 8px;
    font-size: 12px;
  }
  .geo-table th {
    background: #f1f5f9; padding: 6px 8px; text-align: left;
    font-weight: 600; color: #475569; border-bottom: 2px solid #e2e8f0;
  }
  .geo-table td {
    padding: 5px 8px; border-bottom: 1px solid #f1f5f9; color: #64748b;
  }
  .geo-table tr:nth-child(even) td { background: #f8fafc; }

  /* Quiz */
  .quiz-card {
    background: linear-gradient(135deg, #d1fae5, #a7f3d0);
    border-radius: 16px; padding: 20px; margin-bottom: 16px;
  }
  .quiz-card h3 { font-size: 16px; margin-bottom: 12px; }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; }
  .quiz-option {
    background: #fff; border: 2px solid transparent;
    border-radius: 10px; padding: 12px; font-size: 14px;
    cursor: pointer; transition: all 0.2s; text-align: left;
    font-family: inherit;
  }
  .quiz-option:hover { border-color: #10b981; }
  .quiz-option.correct { background: #d1fae5; border-color: #10b981; }
  .quiz-option.wrong { background: #fee2e2; border-color: #ef4444; }
  .quiz-progress {
    font-size: 12px; color: #475569; margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .quiz-score { font-weight: 700; color: #10b981; }

  /* Search results */
  .search-results {
    background: #fff; border-radius: 14px; padding: 16px;
    margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  }
  .search-results h4 { font-size: 14px; color: #475569; margin-bottom: 10px; }
  .search-results .result-item {
    padding: 8px 0; border-bottom: 1px solid #f1f5f9;
    font-size: 13px; color: #64748b; line-height: 1.5;
  }
  .search-results .result-item:last-child { border-bottom: none; }
  .search-results .highlight { background: #fef08a; padding: 0 2px; border-radius: 2px; }

  /* Fact grid */
  .fact-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 16px;
  }
  .fact-card {
    background: #fff; border-radius: 12px; padding: 14px;
    text-align: center; box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  }
  .fact-card .icon { font-size: 28px; margin-bottom: 6px; }
  .fact-card h4 { font-size: 13px; margin-bottom: 2px; }
  .fact-card p { font-size: 11px; color: #94a3b8; }

  .hidden { display: none !important; }

  @media (max-width: 480px) {
    body { font-size: 14px; }
    .app { padding: 0 10px 100px; }
    .head h1 { font-size: 17px; }
    .head .subtitle { font-size: 12px; }
    .tab { padding: 6px 12px; font-size: 13px; }
    .search-box { padding: 10px 12px; font-size: 14px; }
    .geo-card { padding: 12px; margin-bottom: 8px; }
    .geo-card h4 { font-size: 13px; }
    .geo-card .card-body { font-size: 12px; }
    .geo-table { font-size: 11px; }
    .geo-table th { padding: 5px 6px; }
    .geo-table td { padding: 4px 6px; }
    .sub-tab { padding: 5px 10px; font-size: 11px; }
    .quiz-card { padding: 14px; }
    .quiz-card h3 { font-size: 14px; }
    .quiz-option { padding: 10px; font-size: 13px; }
    .fact-grid { gap: 6px; }
    .fact-card { padding: 10px; }
    .fact-card .icon { font-size: 17px; }
    .fact-card h4 { font-size: 12px; }
  }

  @media (min-width: 520px) {
    .app { padding: 0 24px 100px; }
  }

  /* ====== 主题：深色模式 ====== */
  body.theme-dark { background: #0f0f23 !important; color: #e2e8f0 !important; }
  body.theme-dark *, body.theme-dark *::before, body.theme-dark *::after { border-color: rgba(124,107,255,0.15); }
  body.theme-dark .head, body.theme-dark .header, body.theme-dark .app-header, body.theme-dark h1, body.theme-dark h2, body.theme-dark h3 { color: #f8fafc !important; }
  body.theme-dark input, body.theme-dark select, body.theme-dark textarea { background: #1e293b !important; color: #e2e8f0 !important; }
  body.theme-dark button, body.theme-dark .btn { background: #1e293b !important; color: #e2e8f0 !important; border-color: rgba(124,107,255,0.3) !important; }
  /* ====== 主题：中国风 ====== */
  body.theme-chinese { background: #f5f0e8 !important; color: #3d3d3d !important; }
  body.theme-chinese *, body.theme-chinese *::before, body.theme-chinese *::after { border-color: #e8ddd0; }
  body.theme-chinese .head, body.theme-chinese .header, body.theme-chinese .app-header, body.theme-chinese h1, body.theme-chinese h2, body.theme-chinese h3 { color: #2c1810 !important; }
  body.theme-chinese input, body.theme-chinese select, body.theme-chinese textarea { background: #faf6f0 !important; color: #3d3d3d !important; }
  body.theme-chinese button, body.theme-chinese .btn { background: #e8ddd0 !important; color: #2c1810 !important; border-color: #d4c8b8 !important; }
  /* ====== 主题：彩色 ====== */
  body.theme-colorful { background: linear-gradient(180deg, #fef3c7 0%, #fce7f3 50%, #e0e7ff 100%) !important; }
</style>

<script>
// ==================== Tabs ====================
document.querySelectorAll('.top-tabs .tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.top-tabs .tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById(tab.dataset.tab).classList.add('active');
  });
});

// ==================== China/World toggle ====================
document.querySelectorAll('#geoTabs .tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('#geoTabs .tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    document.getElementById('chinaSection').classList.toggle('hidden', tab.dataset.geo !== 'china');
    document.getElementById('worldSection').classList.toggle('hidden', tab.dataset.geo !== 'world');
  });
});

// ==================== Sub-tabs ====================
function setupSubTabs(tabContainerId, contentId, dataMap) {
  var container = document.getElementById(tabContainerId);
  container.addEventListener('click', function(e) {
    var btn = e.target.closest('.sub-tab');
    if (!btn) return;
    container.querySelectorAll('.sub-tab').forEach(function(t) { t.classList.remove('active'); });
    btn.classList.add('active');
    renderCards(contentId, dataMap[btn.dataset.cat] || []);
  });
}

// ==================== Card Rendering ====================
function renderCards(containerId, cards) {
  var container = document.getElementById(containerId);
  container.innerHTML = '';
  cards.forEach(function(card) {
    var div = document.createElement('div');
    div.className = 'geo-card';
    div.setAttribute('data-search', card.title + ' ' + card.body);
    div.innerHTML =
      '<h4>' + card.title + ' <span class="toggle-icon">▼</span></h4>' +
      '<div class="card-body">' + card.body + '</div>';
    div.querySelector('h4').addEventListener('click', function() {
      var body = div.querySelector('.card-body');
      var icon = div.querySelector('.toggle-icon');
      body.classList.toggle('open');
      icon.classList.toggle('open');
    });
    container.appendChild(div);
  });
}

  terrain: [

var searchInput = document.getElementById('geoSearch');
var searchResults = document.getElementById('searchResults');
var searchResultsList = document.getElementById('searchResultsList');

function getAllSearchableContent() {
  var items = [];
  var allData = Object.assign({}, chinaData, worldData);
  for (var cat in allData) {
    allData[cat].forEach(function(card) {
      items.push({ title: card.title, body: card.body });
    });
  }
  return items;
}

searchInput.addEventListener('input', function() {
  var query = this.value.trim();
  if (!query) {
    searchResults.classList.add('hidden');
    return;
  }
  var items = getAllSearchableContent();
  var results = [];
  items.forEach(function(item) {
    if (item.title.indexOf(query) !== -1 || item.body.indexOf(query) !== -1) {
      results.push(item);
    }
  });
  if (results.length === 0) {
    searchResults.classList.remove('hidden');
    searchResultsList.innerHTML = '<div class="result-item">未找到相关内容</div>';
    return;
  }
  searchResults.classList.remove('hidden');
  searchResultsList.innerHTML = '';
  results.forEach(function(item) {
    var div = document.createElement('div');
    div.className = 'result-item';
    var highlightedTitle = item.title.replace(new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'g'), '<span class="highlight">$1</span>');
    var plainBody = item.body.replace(/<[^>]*>/g, '');
    var idx = plainBody.indexOf(query);
    var snippet = '';
    if (idx !== -1) {
      var start = Math.max(0, idx - 30);
      var end = Math.min(plainBody.length, idx + query.length + 30);
      snippet = (start > 0 ? '...' : '') + plainBody.substring(start, end).replace(new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'g'), '<span class="highlight">$1</span>') + (end < plainBody.length ? '...' : '');
    }
    div.innerHTML = '<strong>' + highlightedTitle + '</strong>' + (snippet ? '<br><span style="color:#94a3b8;font-size:12px">' + snippet + '</span>' : '');
    searchResultsList.appendChild(div);
  });
});

    var correctText = q.opts[q.ans];
    var shuffledOpts = shuffleArray(q.opts);
    shuffledOpts.forEach(function(opt) {
      var btn = document.createElement('button');
      btn.className = 'quiz-option';
      btn.textContent = opt;
      btn.addEventListener('click', function() {
        if (btn.classList.contains('correct') || btn.classList.contains('wrong')) return;
        totalAnswered++;
        if (opt === correctText) {
          btn.classList.add('correct');
          score++;
          document.getElementById('quizScore').textContent = '正确: ' + score + '/' + totalAnswered;
          setTimeout(function() {
            idx = (idx + 1) % questions.length;
            if (idx === 0) {
              questions = shuffleArray(geoQuestions);
              score = 0;
              totalAnswered = 0;
              document.getElementById('quizScore').textContent = '正确: 0';
            }
            show();
          }, 800);
        } else {
          btn.classList.add('wrong');
          document.getElementById('quizScore').textContent = '正确: ' + score + '/' + totalAnswered;
        }
      });
      container.appendChild(btn);
    });
  }
  show();
})();
</script>
</body>
</html>
