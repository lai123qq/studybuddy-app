<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f5f7fb">
<title>StudyDash · 学习数据看板</title>
<style>
  @font-face { font-family: 'Bricolage'; src: url('../_shared/fonts/BricolageGrotesque-Regular.ttf') format('truetype'); font-display: swap; }
  @font-face { font-family: 'Bricolage'; src: url('../_shared/fonts/BricolageGrotesque-Bold.ttf') format('truetype'); font-weight: 700; font-display: swap; }

  :root {
    --bg: #f5f7fb;
    --bg-card: #ffffff;
    --ink: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --shadow: 0 2px 12px rgba(0,0,0,0.05);
    --accent-purple: #7f5af0;
    --accent-orange: #ff8906;
    --accent-green: #2cb67d;
    --accent-blue: #3b82f6;
    --accent-pink: #ec4899;
    --accent-red: #e45858;
    --accent-teal: #06b6d4;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Bricolage', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    padding: 28px env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(127,90,240,0.06), transparent),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(59,130,246,0.04), transparent);
  }

  .app {
    position: relative; z-index: 1; max-width: 520px; margin: 0 auto;
    padding: 12px 20px 40px; min-height: 100vh;
  }

  /* ---- Top bar ---- */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--muted); text-decoration: none; font-size: 14px;
    cursor: pointer; font-family: inherit; border: none; background: none;
    padding: 10px 12px; min-height: 44px; border-radius: 10px;
    transition: background 0.2s; margin-top: 0px; }
  .back-btn:hover { background: rgba(127,90,240,0.08); }
  .back-btn:active { opacity: 0.6; }
  .topbar-date { font-size: 13px; color: var(--muted); padding-right: 8px; }

  /* ---- Header ---- */
  .header { text-align: center; padding: 8px 0 20px; margin-top: 20px; }
  .header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .header .subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* ---- Section title ---- */
  .section-title {
    font-size: 16px; font-weight: 700; margin: 28px 0 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: ""; display: inline-block; width: 4px; height: 16px;
    background: var(--accent-purple); border-radius: 2px;
  }

  /* ---- Overview cards (4) ---- */
  .overview-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
    margin-bottom: 4px;
  }
  .ov-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 12px; text-align: center;
    box-shadow: var(--shadow); transition: transform 0.2s;
  }
  .ov-card:active { transform: scale(0.97); }
  .ov-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px; margin-bottom: 8px;
  }
  .ov-num { font-size: 24px; font-weight: 700; line-height: 1.2; }
  .ov-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .ov-focus .ov-icon { background: rgba(255,137,6,0.12); }
  .ov-focus .ov-num { color: var(--accent-orange); }
  .ov-todo .ov-icon { background: rgba(44,182,125,0.12); }
  .ov-todo .ov-num { color: var(--accent-green); }
  .ov-habit .ov-icon { background: rgba(127,90,240,0.12); }
  .ov-habit .ov-num { color: var(--accent-purple); }
  .ov-flash .ov-icon { background: rgba(59,130,246,0.12); }
  .ov-flash .ov-num { color: var(--accent-blue); }

  /* ---- Chart card ---- */
  .chart-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow);
  }
  .chart-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .chart-header .title { font-size: 14px; font-weight: 700; }
  .chart-header .sub { font-size: 12px; color: var(--muted); }
  .bar-chart {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 8px; height: 160px; padding-top: 20px;
  }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar-track {
    width: 100%; height: 110px; background: #f1f5f9; border-radius: 8px;
    position: relative; overflow: hidden;
  }
  .bar-fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    border-radius: 8px 8px 0 0;
    background: linear-gradient(180deg, var(--accent-purple), var(--accent-blue));
    transition: height 0.8s cubic-bezier(0.25,0.8,0.25,1);
    min-height: 0;
  }
  .bar-fill.today { background: linear-gradient(180deg, var(--accent-orange), var(--accent-pink)); }
  .bar-val {
    font-size: 10px; color: var(--ink); font-weight: 600;
    position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
    white-space: nowrap;
  }
  .bar-day { font-size: 11px; color: var(--muted); }

  /* ---- Recent activity ---- */
  .timeline { display: flex; flex-direction: column; gap: 10px; }
  .tl-item {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow); transition: transform 0.15s;
  }
  .tl-item:active { transform: scale(0.98); }
  .tl-icon {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .tl-body { flex: 1; min-width: 0; }
  .tl-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tl-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .tl-time { font-size: 11px; color: var(--muted); flex-shrink: 0; }

  /* ---- Tool summary cards ---- */
  .tool-grid { display: flex; flex-direction: column; gap: 10px; }
  .tool-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    box-shadow: var(--shadow); transition: transform 0.15s;
  }
  .tool-card:active { transform: scale(0.98); }
  .tc-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .tc-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
  }
  .tc-name { font-size: 14px; font-weight: 700; }
  .tc-stats { display: flex; gap: 20px; flex-wrap: wrap; }
  .tc-stat-item {}
  .tc-stat-val { font-size: 18px; font-weight: 700; }
  .tc-stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .tc-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 8px 0; }

  /* ---- Achievement section ---- */
  .achieve-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .achieve-item {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 6px; text-align: center;
    box-shadow: var(--shadow); transition: transform 0.2s;
  }
  .achieve-item:active { transform: scale(0.95); }
  .achieve-item.locked { opacity: 0.45; }
  .achieve-item.locked .ach-icon { filter: grayscale(1); }
  .ach-icon { font-size: 28px; line-height: 1; margin-bottom: 6px; display: block; }
  .ach-name { font-size: 11px; font-weight: 600; line-height: 1.3; }
  .ach-desc { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* ---- Empty state ---- */
  .empty-state {
    text-align: center; padding: 28px 20px; color: var(--muted); font-size: 13px;
  }
  .empty-state .emoji { font-size: 32px; display: block; margin-bottom: 8px; }

  /* ---- Footer ---- */
  .footer { text-align: center; padding: 28px 0 8px; font-size: 12px; color: var(--muted); }

  /* ---- Mobile ---- */
  @media (max-width: 480px) {
    body { font-size: 14px; }
    .app { max-width: 100%; padding: 16px 12px 32px; }
    .header h1 { font-size: 17px; }
    .header { padding: 6px 0 16px; margin-top: 20px; }
    .back-btn { padding: 8px 10px; font-size: 13px; margin-top: 0px; }
    .topbar-date { font-size: 12px; }
    .overview-grid { gap: 8px; }
    .ov-card { padding: 12px 10px; border-radius: 10px; }
    .ov-icon { width: 32px; height: 32px; font-size: 16px; margin-bottom: 6px; }
    .ov-num { font-size: 16px; }
    .ov-label { font-size: 10px; }
    .section-title { font-size: 14px; margin: 22px 0 10px; }
    .chart-card { padding: 16px; border-radius: 10px; }
    .chart-header .title { font-size: 13px; }
    .chart-header .sub { font-size: 11px; }
    .bar-chart { height: 140px; gap: 6px; padding-top: 16px; }
    .bar-track { height: 90px; }
    .bar-val { font-size: 9px; top: -14px; }
    .bar-day { font-size: 10px; }
    .tl-item { padding: 12px; border-radius: 12px; gap: 10px; }
    .tl-icon { width: 36px; height: 36px; font-size: 16px; }
    .tl-title { font-size: 13px; }
    .tl-meta { font-size: 11px; }
    .tl-time { font-size: 10px; }
    .tool-card { padding: 14px 14px; border-radius: 10px; }
    .tc-icon { width: 28px; height: 28px; font-size: 14px; }
    .tc-name { font-size: 13px; }
    .tc-stat-val { font-size: 16px; }
    .achieve-grid { gap: 8px; }
    .achieve-item { padding: 10px 4px; border-radius: 12px; }
    .ach-icon { font-size: 15px; margin-bottom: 4px; }
    .ach-name { font-size: 10px; }
    .ach-desc { font-size: 9px; }
    .footer { padding: 20px 0 6px; font-size: 11px; }
  }

  /* ====== 主题：深色模式 ====== */
  body.theme-dark { background: #0f0f23 !important; color: #e2e8f0 !important; }
  body.theme-dark *, body.theme-dark *::before, body.theme-dark *::after { border-color: rgba(124,107,255,0.15); }
  body.theme-dark .head, body.theme-dark .header, body.theme-dark .app-header, body.theme-dark h1, body.theme-dark h2, body.theme-dark h3 { color: #f8fafc !important; }
  body.theme-dark input, body.theme-dark select, body.theme-dark textarea { background: #1e293b !important; color: #e2e8f0 !important; }
  body.theme-dark button, body.theme-dark .btn { background: #1e293b !important; color: #e2e8f0 !important; border-color: rgba(124,107,255,0.3) !important; }
  /* ====== 主题：中国风 ====== */
  body.theme-chinese { background: #f5f0e8 !important; color: #3d3d3d !important; }
  body.theme-chinese *, body.theme-chinese *::before, body.theme-chinese *::after { border-color: #e8ddd0; }
  body.theme-chinese .head, body.theme-chinese .header, body.theme-chinese .app-header, body.theme-chinese h1, body.theme-chinese h2, body.theme-chinese h3 { color: #2c1810 !important; }
  body.theme-chinese input, body.theme-chinese select, body.theme-chinese textarea { background: #faf6f0 !important; color: #3d3d3d !important; }
  body.theme-chinese button, body.theme-chinese .btn { background: #e8ddd0 !important; color: #2c1810 !important; border-color: #d4c8b8 !important; }
  /* ====== 主题：彩色 ====== */
  body.theme-colorful { background: linear-gradient(180deg, #fef3c7 0%, #fce7f3 50%, #e0e7ff 100%) !important; }
</style>
<script defer src="../_shared/js/page-enter.js?v=20260710f"></script>

<body>
<div class="app">

  <!-- Top bar -->
  <div class="topbar">
    <a class="back-btn" href="../index-v2.html">&#8592; 返回</a>
    <span class="topbar-date" id="topDate"></span>
  </div>

  <!-- Header -->
  <div class="header">
    <h1>&#128202; 学习数据看板</h1>
    <p class="subtitle" id="headerDate"></p>
  </div>

  <!-- 1. 今日概览 -->
  <div class="section-title">今日概览</div>
  <div class="overview-grid">
    <div class="ov-card ov-focus">
      <div class="ov-icon">&#9201;</div>
      <div class="ov-num" id="ovFocusMins">--</div>
      <div class="ov-label">今日专注(分钟)</div>
    </div>
    <div class="ov-card ov-todo">
      <div class="ov-icon">&#9989;</div>
      <div class="ov-num" id="ovTodoRate">--</div>
      <div class="ov-label">今日待办完成率</div>
    </div>
    <div class="ov-card ov-habit">
      <div class="ov-icon">&#128293;</div>
      <div class="ov-num" id="ovHabitRate">--</div>
      <div class="ov-label">今日打卡率</div>
    </div>
    <div class="ov-card ov-flash">
      <div class="ov-icon">&#128220;</div>
      <div class="ov-num" id="ovFlashRate">--</div>
      <div class="ov-label">今日闪卡完成率</div>
    </div>
  </div>

  <!-- 2. 本周专注趋势 -->
  <div class="section-title">本周专注趋势</div>
  <div class="chart-card">
    <div class="chart-header">
      <span class="title">专注时长</span>
      <span class="sub">分钟 / 天</span>
    </div>
    <div class="bar-chart" id="focusChart"></div>
  </div>

  <!-- 3. 最近活动 -->
  <div class="section-title">最近活动</div>
  <div class="timeline" id="timelineList"></div>

  <!-- 4. 各工具数据摘要 -->
  <div class="section-title">各工具数据摘要</div>
  <div class="tool-grid" id="toolGrid"></div>

  <!-- 5. 学习成就 -->
  <div class="section-title">学习成就</div>
  <div class="achieve-grid" id="achieveGrid"></div>

  <div class="footer">StudyDash · 学习数据看板</div>
</div>

<script>
(function() {
  'use strict';

  /* ========== 工具函数 ========== */
  function pad(n) { return String(n).padStart(2, '0'); }
  function todayKey() {
    var d = new Date();
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
  }
  function daysAgo(n) {
    var d = new Date(); d.setDate(d.getDate() - n);
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
  }
  function formatDateCN(d) {
    var dt = new Date(d);
    return dt.getFullYear() + '年' + (dt.getMonth() + 1) + '月' + dt.getDate() + '日';
  }
  function dayOfWeek(key) {
    var map = {0:'日',1:'一',2:'二',3:'三',4:'四',5:'五',6:'六'};
    return map[new Date(key).getDay()] || '';
  }
  function safeJSON(key, fallback) {
    try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch(e) { return fallback; }
  }
  function timePart(iso) {
    if (!iso) return '';
    // 支持 "2026-01-01T10:30:00" 或 "10:30"
    if (iso.indexOf('T') !== -1) return iso.split('T')[1].slice(0, 5);
    if (iso.indexOf(' ') !== -1) return iso.split(' ')[1].slice(0, 5);
    return iso.length >= 5 ? iso.slice(0, 5) : iso;
  }

  /* ========== 日期 ========== */
  var today = todayKey();
  document.getElementById('topDate').textContent = formatDateCN(new Date());
  document.getElementById('headerDate').textContent = formatDateCN(new Date()) + '  周' + dayOfWeek(today);

  /* ========== 数据收集 ========== */
  var activities = [];

  /* ---------- 1. 番茄钟 (focusflow_v5) ---------- */
  var pomo = { todayMins: 0, sessionCount: 0, weekly: {}, sessionLog: [] };
  try {
    var raw = safeJSON('focusflow_v5', {});
    pomo.todayMins = Number(raw.totalFocusMinutes) || 0;
    pomo.sessionCount = Number(raw.sessionCount) || 0;
    if (raw.weekly && typeof raw.weekly === 'object') {
      pomo.weekly = raw.weekly;
    }
    if (Array.isArray(raw.sessionLog)) {
      pomo.sessionLog = raw.sessionLog;
      raw.sessionLog.slice(-5).forEach(function(s) {
        activities.push({
          icon: '&#9201;', bg: 'rgba(255,137,6,0.12)',
          title: '专注 ' + (s.mins || s.minutes || 0) + ' 分钟',
          meta: (s.subject || s.tag || '自由专注'),
          time: s.date || s.timestamp || ''
        });
      });
    }
  } catch(e) {}

  /* ---------- 2. 习惯打卡 (streakly-habits) ---------- */
  var habit = { todayDone: 0, todayTotal: 0, longestStreak: 0, totalChecks: 0 };
  try {
    var hList = safeJSON('streakly-habits', []);
    if (!Array.isArray(hList)) hList = [];
    habit.todayTotal = hList.length;
    hList.forEach(function(h) {
      // records: { "2026-07-05": true, ... }
      var rec = h.records || {};
      if (rec[today]) habit.todayDone++;
      // count all true records
      Object.keys(rec).forEach(function(k) { if (rec[k]) habit.totalChecks++; });
      // streak: calculate longest consecutive for this habit
      var dates = Object.keys(rec).filter(function(k) { return rec[k]; }).sort();
      if (dates.length > 0) {
        var maxS = 1, curS = 1;
        for (var i = 1; i < dates.length; i++) {
          var prev = new Date(dates[i-1]); prev.setDate(prev.getDate() + 1);
          var nextStr = prev.getFullYear() + '-' + pad(prev.getMonth()+1) + '-' + pad(prev.getDate());
          if (nextStr === dates[i]) { curS++; } else { curS = 1; }
          if (curS > maxS) maxS = curS;
        }
        if (maxS > habit.longestStreak) habit.longestStreak = maxS;
      }
      // recent records for activity
      var recentDates = Object.keys(rec).filter(function(k){ return rec[k] && k >= daysAgo(7); }).sort().reverse();
      recentDates.slice(0, 2).forEach(function(d) {
        activities.push({
          icon: '&#128293;', bg: 'rgba(127,90,240,0.12)',
          title: '打卡: ' + (h.name || h.title || '习惯'),
          meta: '已完成',
          time: d + 'T09:00:00'
        });
      });
    });
  } catch(e) {}

  /* ---------- 3. 待办清单 (taskflow_YYYY-MM-DD) ---------- */
  var todo = { todayDone: 0, todayTotal: 0, allDone: 0, allTotal: 0, recentItems: [] };
  try {
    var todayTodo = safeJSON('taskflow_' + today, []);
    if (Array.isArray(todayTodo)) {
      todo.todayTotal = todayTodo.length;
      todayTodo.forEach(function(t) { if (t.completed || t.done) todo.todayDone++; });
      todayTodo.filter(function(t) { return t.completed || t.done; }).slice(-3).forEach(function(t) {
        activities.push({
          icon: '&#9989;', bg: 'rgba(44,182,125,0.12)',
          title: '完成待办: ' + (t.text || t.title || '任务'),
          meta: (t.category || t.tag || ''),
          time: today
        });
      });
    }
    // aggregate all days
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.indexOf('taskflow_') === 0) {
        var items = safeJSON(k, []);
        if (Array.isArray(items)) {
          todo.allTotal += items.length;
          items.forEach(function(t) { if (t.completed || t.done) todo.allDone++; });
        }
      }
    }
  } catch(e) {}

  /* ---------- 4. 考试倒计时 (pinpoint_v3) ---------- */
  var exam = { exams: [], mocks: [], topicStats: {} };
  try {
    var ep = safeJSON('pinpoint_v3', {});
    if (Array.isArray(ep.exams)) {
      exam.exams = ep.exams.slice(0, 5).map(function(e) {
        var remain = 0;
        if (e.date) {
          var diff = new Date(e.date).getTime() - new Date(today).getTime();
          remain = Math.ceil(diff / 86400000);
        }
        return { name: e.name || e.exam || '考试', days: remain };
      });
      exam.exams.forEach(function(e) {
        if (e.days >= 0) {
          activities.push({
            icon: '&#127891;', bg: 'rgba(228,88,88,0.12)',
            title: (e.days === 0 ? '今天考试' : e.days + '天后: ' + e.name),
            meta: '倒计时',
            time: today
          });
        }
      });
    }
    if (Array.isArray(ep.mocks)) {
      exam.mocks = ep.mocks.slice(-5).map(function(m) {
        return { name: m.exam || m.name || '模考', score: m.score || 0, date: m.date || '' };
      });
      exam.mocks.forEach(function(m) {
        activities.push({
          icon: '&#128203;', bg: 'rgba(228,88,88,0.10)',
          title: '模考 ' + m.name + ': ' + m.score + '分',
          meta: m.date || '',
          time: m.date || ''
        });
      });
    }
    if (typeof ep.topics === 'object' && ep.topics !== null) {
      var mastered = 0, learning = 0, unlearned = 0;
      Object.keys(ep.topics).forEach(function(t) {
        var st = ep.topics[t];
        if (typeof st === 'number') {
          if (st >= 80) mastered++; else if (st > 0) learning++; else unlearned++;
        }
      });
      exam.topicStats = { mastered: mastered, learning: learning, unlearned: unlearned };
    }
  } catch(e) {}

  /* ---------- 5. 闪卡记忆 (recalleum_v3 + recalleum-*) ---------- */
  var flash = { totalCards: 0, learnedCards: 0, streak: 0, todayDone: 0, todayGoal: 0 };
  try {
    // 主存储: recalleum_v3
    var rv3 = safeJSON('recalleum_v3', null);
    if (rv3 && rv3.decks) {
      rv3.decks.forEach(function(deck) {
        if (deck.cards) {
          flash.totalCards += deck.cards.length;
          deck.cards.forEach(function(c) {
            if (c.rep > 0 || c.interval > 0) flash.learnedCards++;
          });
        }
      });
      flash.streak = rv3.streak || 0;
      flash.todayGoal = rv3.goalTarget || 0;
      flash.todayDone = rv3.goalDone || 0;
    }
    // 备用: 新版 key
    if (flash.totalCards === 0) {
      var fc = safeJSON('recalleum-cards-v2', []);
      if (Array.isArray(fc)) {
        flash.totalCards = fc.length;
        fc.forEach(function(c) {
          if (c.reviewedCount > 0 || c.repetitions > 0 || c.interval > 0) flash.learnedCards++;
        });
      }
      flash.streak = flash.streak || Number(safeJSON('recalleum-streak', 0)) || 0;
      flash.todayDone = flash.todayDone || Number(safeJSON('recalleum-goal-completion', 0)) || 0;
      flash.todayGoal = flash.todayGoal || Number(safeJSON('recalleum-daily-goal', 0)) || 0;
    }
  } catch(e) {}

  /* ---------- 6. 英语单词本 (vb_*) ---------- */
  var vocab = { streak: 0, libs: [] };
  try {
    vocab.streak = Number(safeJSON('vb_streak', 0)) || 0;
    // scan for vb_learned_*, vb_correct_*, vb_total_*
    var libMap = {};
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (!k) continue;
      var m;
      if ((m = k.match(/^vb_learned_(.+)$/))) {
        libMap[m[1]] = libMap[m[1]] || {};
        libMap[m[1]].learned = Number(safeJSON(k, 0)) || 0;
      }
      if ((m = k.match(/^vb_total_(.+)$/))) {
        libMap[m[1]] = libMap[m[1]] || {};
        libMap[m[1]].total = Number(safeJSON(k, 0)) || 0;
      }
      if ((m = k.match(/^vb_correct_(.+)$/))) {
        libMap[m[1]] = libMap[m[1]] || {};
        libMap[m[1]].correct = Number(safeJSON(k, 0)) || 0;
      }
    }
    Object.keys(libMap).forEach(function(lib) {
      var l = libMap[lib];
      var total = l.total || 1;
      var accuracy = l.correct !== undefined ? Math.round((l.correct / total) * 100) : null;
      vocab.libs.push({
        name: lib, learned: l.learned || 0, total: l.total || 0,
        correct: l.correct || 0, accuracy: accuracy
      });
    });
  } catch(e) {}

  /* ---------- 7. 数学训练 (mathPractice_state) ---------- */
  var math = { total: 0, correct: 0, wrong: 0, maxStreak: 0, streakCount: 0, wrongQuestions: 0 };
  try {
    var ms = safeJSON('mathPractice_state', {});
    if (ms.stats) {
      math.total = Number(ms.stats.totalQuestions) || 0;
      math.correct = Number(ms.stats.correctCount) || 0;
      math.wrong = Number(ms.stats.wrongCount) || 0;
      math.maxStreak = Number(ms.stats.maxStreak) || 0;
      math.streakCount = Number(ms.stats.streakCount) || 0;
    }
    if (Array.isArray(ms.wrongQuestions)) {
      math.wrongQuestions = ms.wrongQuestions.length;
    }
  } catch(e) {}

  /* ---------- 8. 倒数日 (studybuddy_countdown_events) ---------- */
  var countdown = { events: [] };
  try {
    var evts = safeJSON('studybuddy_countdown_events', []);
    if (Array.isArray(evts)) {
      countdown.events = evts.slice(0, 5).map(function(e) {
        var remain = 0;
        if (e.date) {
          var diff = new Date(e.date).getTime() - new Date(today).getTime();
          remain = Math.ceil(diff / 86400000);
        }
        return { name: e.name || e.title || '事件', days: remain };
      });
    }
  } catch(e) {}

  /* ---------- 9. 古诗文 (classical_chinese_state) ---------- */
  var poetry = { learned: 0, recited: 0 };
  try {
    var cp = safeJSON('classical_chinese_state', {});
    poetry.learned = Array.isArray(cp.learnedPoems) ? cp.learnedPoems.length : 0;
    poetry.recited = Array.isArray(cp.recitedPoems) ? cp.recitedPoems.length : 0;
  } catch(e) {}

  /* ---------- 10. 作文素材 (essay_favorites) ---------- */
  var essay = { favorites: 0 };
  try {
    var ef = safeJSON('essay_favorites', []);
    essay.favorites = Array.isArray(ef) ? ef.length : 0;
  } catch(e) {}

  /* ========== 渲染 ========== */

  /* -- 1. 今日概览 -- */
  // 今日专注
  var todayFocus = pomo.weekly[today] || 0;
  document.getElementById('ovFocusMins').textContent = todayFocus;

  // 今日待办完成率
  var todoRate = todo.todayTotal > 0 ? Math.round((todo.todayDone / todo.todayTotal) * 100) : -1;
  document.getElementById('ovTodoRate').textContent = todoRate >= 0 ? todoRate + '%' : '--';

  // 今日打卡率
  var habitRate = habit.todayTotal > 0 ? Math.round((habit.todayDone / habit.todayTotal) * 100) : -1;
  document.getElementById('ovHabitRate').textContent = habitRate >= 0 ? habitRate + '%' : '--';

  // 今日闪卡完成率
  var flashRate;
  if (flash.todayGoal > 0) {
    flashRate = Math.round((flash.todayDone / flash.todayGoal) * 100);
    document.getElementById('ovFlashRate').textContent = flashRate + '%';
  } else if (flash.todayDone > 0) {
    document.getElementById('ovFlashRate').textContent = flash.todayDone + '张';
  } else if (flash.totalCards > 0) {
    document.getElementById('ovFlashRate').textContent = flash.learnedCards + '/' + flash.totalCards;
  } else {
    document.getElementById('ovFlashRate').textContent = '--';
  }

  /* -- 2. 本周专注趋势（柱状图）-- */
  var chartEl = document.getElementById('focusChart');
  var barData = [];
  var weekMax = 0;
  // 本周一到今天
  var dow = new Date(today).getDay(); // 0=Sun
  var mondayOffset = dow === 0 ? 6 : dow - 1;
  for (var i = 6; i >= 0; i--) {
    var dk = daysAgo(mondayOffset + (6 - i));
    var val = Number(pomo.weekly[dk]) || 0;
    barData.push({ key: dk, val: val });
    if (val > weekMax) weekMax = val;
  }
  // 确保 max 不为0
  if (weekMax < 30) weekMax = 30;

  barData.forEach(function(d) {
    var col = document.createElement('div');
    col.className = 'bar-col';
    var track = document.createElement('div');
    track.className = 'bar-track';
    var fill = document.createElement('div');
    fill.className = 'bar-fill' + (d.key === today ? ' today' : '');
    var pct = Math.round((d.val / weekMax) * 100);
    fill.style.height = '0%';
    track.appendChild(fill);
    if (d.val > 0) {
      var valEl = document.createElement('div');
      valEl.className = 'bar-val';
      valEl.textContent = d.val;
      track.appendChild(valEl);
    }
    var label = document.createElement('div');
    label.className = 'bar-day';
    label.textContent = dayOfWeek(d.key);
    col.appendChild(track);
    col.appendChild(label);
    chartEl.appendChild(col);
    // animate
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        fill.style.height = pct + '%';
      });
    });
  });

  /* -- 3. 最近活动 -- */
  activities.sort(function(a, b) { return (b.time || '').localeCompare(a.time || ''); });
  var recent = activities.slice(0, 10);
  var tlEl = document.getElementById('timelineList');
  if (recent.length === 0) {
    tlEl.innerHTML = '<div class="empty-state"><span class="emoji">&#128221;</span>暂无活动记录，去使用工具开始学习吧</div>';
  } else {
    recent.forEach(function(a) {
      var item = document.createElement('div');
      item.className = 'tl-item';
      item.innerHTML =
        '<div class="tl-icon" style="background:' + (a.bg || 'rgba(127,90,240,0.12)') + '">' + a.icon + '</div>' +
        '<div class="tl-body">' +
          '<div class="tl-title">' + a.title + '</div>' +
          '<div class="tl-meta">' + (a.meta || '') + '</div>' +
        '</div>' +
        '<div class="tl-time">' + timePart(a.time) + '</div>';
      tlEl.appendChild(item);
    });
  }

  /* -- 4. 各工具数据摘要 -- */
  var toolEl = document.getElementById('toolGrid');

  function renderToolCard(name, icon, iconBg, statsHtml) {
    var card = document.createElement('div');
    card.className = 'tool-card';
    card.innerHTML =
      '<div class="tc-header">' +
        '<div class="tc-icon" style="background:' + iconBg + '">' + icon + '</div>' +
        '<div class="tc-name">' + name + '</div>' +
      '</div>' +
      '<div class="tc-stats">' + statsHtml + '</div>';
    toolEl.appendChild(card);
  }

  function statHtml(val, label, color) {
    return '<div class="tc-stat-item"><div class="tc-stat-val" style="color:' + color + '">' + val + '</div><div class="tc-stat-label">' + label + '</div></div>';
  }

  var hasAnyTool = false;

  // 番茄钟
  if (pomo.sessionCount > 0 || todayFocus > 0 || Object.keys(pomo.weekly).length > 0) {
    hasAnyTool = true;
    renderToolCard('番茄钟', '&#9201;', 'rgba(255,137,6,0.12)',
      statHtml(todayFocus, '今日专注(分)', 'var(--accent-orange)') +
      statHtml(pomo.sessionCount, '总番茄数', 'var(--accent-orange)') +
      statHtml(pomo.todayMins, '累计专注(分)', 'var(--accent-orange)')
    );
  }

  // 习惯打卡
  if (habit.todayTotal > 0) {
    hasAnyTool = true;
    renderToolCard('习惯打卡', '&#128293;', 'rgba(127,90,240,0.12)',
      statHtml(habit.todayDone + '/' + habit.todayTotal, '今日打卡', 'var(--accent-purple)') +
      statHtml(habit.longestStreak, '最长连续(天)', 'var(--accent-purple)') +
      statHtml(habit.totalChecks, '总打卡次数', 'var(--accent-purple)')
    );
  }

  // 待办清单
  if (todo.allTotal > 0) {
    hasAnyTool = true;
    var allRate = todo.allTotal > 0 ? Math.round((todo.allDone / todo.allTotal) * 100) : 0;
    renderToolCard('待办清单', '&#9989;', 'rgba(44,182,125,0.12)',
      statHtml(todo.todayDone + '/' + todo.todayTotal, '今日完成', 'var(--accent-green)') +
      statHtml(todo.allDone, '总完成数', 'var(--accent-green)') +
      statHtml(allRate + '%', '总完成率', 'var(--accent-green)')
    );
  }

  // 考试倒计时
  if (exam.exams.length > 0 || exam.mocks.length > 0) {
    hasAnyTool = true;
    var examStats = '';
    if (exam.exams.length > 0) {
      var nearest = exam.exams.reduce(function(a, b) { return a.days < b.days ? a : b; });
      examStats += statHtml(nearest.days, '最近考试(天)', 'var(--accent-red)');
    }
    if (exam.mocks.length > 0) {
      var latest = exam.mocks[exam.mocks.length - 1];
      examStats += statHtml(latest.score, '最近模考(分)', 'var(--accent-red)');
    }
    var topicTotal = exam.topicStats.mastered + exam.topicStats.learning + exam.topicStats.unlearned;
    if (topicTotal > 0) {
      examStats += statHtml(exam.topicStats.mastered, '已掌握知识点', 'var(--accent-red)');
    }
    examStats += statHtml(exam.exams.length, '考试数量', 'var(--accent-red)');
    renderToolCard('考试倒计时', '&#127891;', 'rgba(228,88,88,0.12)', examStats);
  }

  // 闪卡记忆
  if (flash.totalCards > 0 || flash.streak > 0) {
    hasAnyTool = true;
    renderToolCard('闪卡记忆', '&#128220;', 'rgba(59,130,246,0.12)',
      statHtml(flash.learnedCards + '/' + flash.totalCards, '已学/总卡片', 'var(--accent-blue)') +
      statHtml(flash.streak, '连续天数', 'var(--accent-blue)') +
      statHtml(flash.todayDone + '/' + flash.todayGoal, '今日完成/目标', 'var(--accent-blue)')
    );
  }

  // 英语单词本
  if (vocab.streak > 0 || vocab.libs.length > 0) {
    hasAnyTool = true;
    var vbStats = statHtml(vocab.streak, '连续天数', 'var(--accent-teal)');
    var totalLearned = 0, totalWords = 0, totalCorrect = 0;
    vocab.libs.forEach(function(l) {
      totalLearned += l.learned; totalWords += l.total; totalCorrect += (l.correct || 0);
    });
    vbStats += statHtml(totalLearned, '已学单词', 'var(--accent-teal)');
    if (totalWords > 0) {
      vbStats += statHtml(Math.round((totalCorrect / totalWords) * 100) + '%', '正确率', 'var(--accent-teal)');
    }
    vbStats += statHtml(vocab.libs.length, '词库数量', 'var(--accent-teal)');
    renderToolCard('英语单词本', '&#127468;&#127463;', 'rgba(6,182,212,0.12)', vbStats);
  }

  // 数学训练
  if (math.total > 0) {
    hasAnyTool = true;
    renderToolCard('数学训练', '&#128218;', 'rgba(236,72,153,0.12)',
      statHtml(math.correct + '/' + math.total, '正确/总题数', 'var(--accent-pink)') +
      statHtml(math.maxStreak, '最长连对', 'var(--accent-pink)') +
      statHtml(math.wrongQuestions, '错题数', 'var(--accent-pink)')
    );
  }

  // 倒数日
  if (countdown.events.length > 0) {
    hasAnyTool = true;
    var cdStats = '';
    countdown.events.slice(0, 3).forEach(function(e) {
      cdStats += statHtml(e.days, e.name, 'var(--accent-purple)');
    });
    renderToolCard('倒数日', '&#128197;', 'rgba(127,90,240,0.12)', cdStats);
  }

  // 古诗文
  if (poetry.learned > 0 || poetry.recited > 0) {
    hasAnyTool = true;
    renderToolCard('古诗文', '&#128214;', 'rgba(255,137,6,0.12)',
      statHtml(poetry.learned, '已学篇目', 'var(--accent-orange)') +
      statHtml(poetry.recited, '已背诵篇目', 'var(--accent-orange)')
    );
  }

  // 作文素材
  if (essay.favorites > 0) {
    hasAnyTool = true;
    renderToolCard('作文素材', '&#128221;', 'rgba(44,182,125,0.12)',
      statHtml(essay.favorites, '收藏素材数', 'var(--accent-green)')
    );
  }

  if (!hasAnyTool) {
    toolEl.innerHTML = '<div class="empty-state"><span class="emoji">&#128214;</span>暂无数据，去使用对应工具吧</div>';
  }

  /* -- 5. 学习成就 -- */
  // 计算累计数据
  var totalFocusAll = 0;
  Object.keys(pomo.weekly).forEach(function(k) { totalFocusAll += (pomo.weekly[k] || 0); });

  var badges = [
    { name: '初次启程', desc: '首次记录学习', emoji: '&#127939;', ok: hasAnyTool },
    { name: '专注达人', desc: '累计专注10h', emoji: '&#9201;', ok: totalFocusAll >= 600 },
    { name: '专注新星', desc: '累计专注1h', emoji: '&#11088;', ok: totalFocusAll >= 60 },
    { name: '番茄新手', desc: '完成1个番茄', emoji: '&#127813;', ok: pomo.sessionCount >= 1 },
    { name: '番茄达人', desc: '完成50个番茄', emoji: '&#127813;', ok: pomo.sessionCount >= 50 },
    { name: '习惯养成', desc: '连续打卡7天', emoji: '&#128293;', ok: habit.longestStreak >= 7 },
    { name: '习惯起步', desc: '连续打卡3天', emoji: '&#128294;', ok: habit.longestStreak >= 3 },
    { name: '任务达人', desc: '待办完成率80%', emoji: '&#9989;', ok: todo.allTotal >= 5 && (todo.allDone / todo.allTotal) >= 0.8 },
    { name: '备考先锋', desc: '添加1个考试', emoji: '&#127891;', ok: exam.exams.length >= 1 },
    { name: '模考先锋', desc: '完成1次模考', emoji: '&#128203;', ok: exam.mocks.length >= 1 },
    { name: '记忆学者', desc: '学10张闪卡', emoji: '&#128220;', ok: flash.learnedCards >= 10 },
    { name: '记忆大师', desc: '学100张闪卡', emoji: '&#129504;', ok: flash.learnedCards >= 100 },
    { name: '词汇新星', desc: '学50个单词', emoji: '&#128218;', ok: vocab.libs.reduce(function(s, l) { return s + l.learned; }, 0) >= 50 },
    { name: '数学新秀', desc: '答对20题', emoji: '&#128187;', ok: math.correct >= 20 },
    { name: '数学达人', desc: '答对100题', emoji: '&#129504;', ok: math.correct >= 100 },
    { name: '连续学习', desc: '闪卡连续3天', emoji: '&#128197;', ok: flash.streak >= 3 }
  ];

  var achEl = document.getElementById('achieveGrid');
  badges.forEach(function(b) {
    var item = document.createElement('div');
    item.className = 'achieve-item' + (b.ok ? '' : ' locked');
    item.innerHTML =
      '<span class="ach-icon">' + b.emoji + '</span>' +
      '<div class="ach-name">' + b.name + '</div>' +
      '<div class="ach-desc">' + b.desc + '</div>';
    achEl.appendChild(item);
  });

})();
</script>
<script>
// 主题继承
(function(){try{var t=localStorage.getItem('studybuddy_theme')||'light';if(t==='dark')document.body.classList.add('theme-dark');else if(t==='chinese')document.body.classList.add('theme-chinese');else if(t==='colorful')document.body.classList.add('theme-colorful');}catch(e){}})();
</script>
</body>
